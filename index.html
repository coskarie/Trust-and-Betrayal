<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>위험한 동업자 (스파이 카지노) - Art Deco Edition</title>
    
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Marcellus&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        obsidian: '#0A0A0A', 
                        champagne: '#F2F0E4', 
                        charcoal: '#141414', 
                        gold: '#D4AF37', 
                        midnight: '#1E3D59', 
                        pewter: '#888888'
                    },
                    fontFamily: { 
                        display: ['Marcellus', '"Noto Serif KR"', 'serif'], 
                        body: ['"Josefin Sans"', '"Noto Serif KR"', 'sans-serif'],
                        mono: ['"Josefin Sans"', 'monospace']
                    },
                    boxShadow: {
                        'gold-glow': '0 0 15px rgba(212, 175, 55, 0.2)',
                        'gold-glow-hover': '0 0 20px rgba(212, 175, 55, 0.5)',
                        'gold-glow-intense': '0 0 30px rgba(212, 175, 55, 0.8)'
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: #0A0A0A; 
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden; 
            color: #F2F0E4;
        }

        /* 아르데코 대각선 빗살무늬 배경 */
        .art-deco-bg {
            background-color: #0A0A0A;
            background-image: 
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.03) 0, rgba(212, 175, 55, 0.03) 1px, transparent 0, transparent 20px), 
                repeating-linear-gradient(-45deg, rgba(212, 175, 55, 0.03) 0, rgba(212, 175, 55, 0.03) 1px, transparent 0, transparent 20px);
        }

        /* 메인 컨테이너 */
        #game-container {
            width: 100%; height: 100%; max-width: 56vh; aspect-ratio: 9 / 16;
            position: relative; overflow: hidden;
            border-left: 2px solid rgba(212, 175, 55, 0.2);
            border-right: 2px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
            display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex-direction: column; width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        .screen.active { display: flex; }

        /* 아르데코 모서 장식 (L-brackets) */
        .deco-bracket { position: absolute; width: 16px; height: 16px; border-color: #D4AF37; border-style: solid; z-index: 40; pointer-events: none; opacity: 0.6; }
        .deco-bracket--tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .deco-bracket--tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
        .deco-bracket--bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
        .deco-bracket--br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* 다이아몬드 장식 */
        .diamond-dot { width: 6px; height: 6px; background-color: #D4AF37; transform: rotate(45deg); display: inline-block; }

        /* 더블 프레임 효과 */
        .double-frame { position: relative; }
        .double-frame::before {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2); pointer-events: none; z-index: 5;
            transition: border-color 0.5s ease;
        }
        .double-frame:hover::before { border-color: rgba(212, 175, 55, 0.8); }

        /* 스크롤바 디자인 */
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-track { background: #141414; }
        .filter-scroll::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); }

        /* 입력 폼 (Underlined Elegance) */
        .input-deco {
            width: 100%; height: 48px; padding: 8px 12px;
            background: transparent; border: none; border-bottom: 2px solid rgba(212, 175, 55, 0.4);
            color: #F2F0E4; font-family: 'Josefin Sans', sans-serif; font-size: 16px;
            transition: all 0.3s ease; text-align: center; letter-spacing: 0.1em;
        }
        .input-deco:focus { border-bottom-color: #D4AF37; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); outline: none; }
        .input-deco::placeholder { color: #888888; letter-spacing: normal; }

        /* 버튼 (Precision Instruments) */
        .btn-deco {
            width: 100%; display: flex; justify-content: center; align-items: center;
            background: transparent; border: 2px solid #D4AF37; color: #D4AF37;
            font-family: 'Marcellus', 'Noto Serif KR', serif; font-size: 14px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0; position: relative;
        }
        .btn-deco:hover { background: #D4AF37; color: #0A0A0A; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .btn-deco:active { transform: scale(0.98); }
        .btn-deco:disabled { border-color: #555; color: #555; cursor: not-allowed; background: transparent; box-shadow: none; }
        .btn-solid { background: #D4AF37; color: #0A0A0A; }
        .btn-solid:hover { background: #F2E8C4; color: #0A0A0A; }

        /* 알림 모달 */
        #alert-modal {
            display: none; position: absolute; inset: 0; background-color: rgba(10,10,10,0.9);
            z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .alert-box { 
            background-color: #141414; border: 1px solid #D4AF37; padding: 30px 20px; 
            text-align: center; width: 100%; max-width: 320px; position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        /* --- 밤(해킹/CCTV 단말기) 테마 전용 CSS --- */
        .scanline-overlay {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
        }
        .vignette-bg {
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.85) 150%);
            pointer-events: none;
        }
        .rec-dot {
            width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; box-shadow: 0 0 8px #ef4444; }
            50% { opacity: 0.3; box-shadow: 0 0 2px #ef4444; }
            100% { opacity: 1; box-shadow: 0 0 8px #ef4444; }
        }
        .btn-hacker {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(239, 68, 68, 0.5); color: #f87171;
            font-family: 'Josefin Sans', monospace; font-size: 13px; font-weight: bold;
            letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; position: relative;
        }
        .btn-hacker:hover {
            border-color: #ef4444; background: rgba(127, 29, 29, 0.3); color: #fca5a5; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
        .cctv-bracket { position: absolute; width: 12px; height: 12px; border-color: rgba(239, 68, 68, 0.6); border-style: solid; z-index: 40; pointer-events: none; }
        .cctv-bracket--tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .cctv-bracket--tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
        .cctv-bracket--bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
        .cctv-bracket--br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* 게임 내부 요소 (, 카드 등) 효과 */
        .blink-effect { animation: blink 0.5s 2; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        
        .game-item-btn { transition: all 0.2s; }
        .game-item-btn:active { transform: scale(0.9); background-color: #D4AF37; color: #000; }
    </style>
</head>
<body>

<div id="game-container" class="art-deco-bg">
    
    <span class="deco-bracket deco-bracket--tl"></span>
    <span class="deco-bracket deco-bracket--tr"></span>
    <span class="deco-bracket deco-bracket--bl"></span>
    <span class="deco-bracket deco-bracket--br"></span>

    <div id="login-screen" class="screen active p-8">
        <div class="flex-grow flex flex-col justify-center items-center w-full">
            <div class="text-center mb-16 relative w-full">
                <div class="flex justify-center items-center gap-3 mb-4">
                    <div class="h-px w-12 bg-gradient-to-l from-gold to-transparent"></div>
                    <span class="diamond-dot"></span>
                    <div class="h-px w-12 bg-gradient-to-r from-gold to-transparent"></div>
                </div>
                <h1 class="font-display text-3xl text-gold tracking-[0.2em] uppercase font-bold drop-shadow-[0_0_10px_rgba(212,175,55,0.4)] leading-tight">위험한<br>동업자</h1>
                <p class="font-display text-[10px] text-champagne/60 tracking-[0.3em] uppercase mt-4">Spy Casino Protocol</p>
            </div>

            <div class="w-full space-y-8 mb-10">
                <div class="relative w-full text-center">
                    <label class="block mb-2 font-display text-xs text-gold tracking-[0.1em] uppercase">Agent Identity</label>
                    <input type="text" id="player-name" class="input-deco" maxlength="7" placeholder="요원 이름 입력">
                </div>
                <div class="relative w-full text-center">
                    <label class="block mb-2 font-display text-xs text-gold tracking-[0.1em] uppercase">Access Code</label>
                    <input type="number" id="room-num" class="input-deco" min="1" max="9" placeholder="방 번호 (1~9)">
                </div>
            </div>

            <button id="btn-login" class="btn-deco btn-solid h-12 w-full mt-4">입장하기</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen p-6 pt-12">
        <div class="text-center mb-8 border-b border-gold/30 pb-4">
            <p class="font-display text-[10px] text-pewter tracking-[0.3em] uppercase mb-1">VIP Lounge</p>
            <h2 class="font-display text-xl text-gold tracking-[0.2em]">ROOM <span id="display-room"></span></h2>
        </div>
        
        <div id="players-container" class="w-full flex flex-col gap-4 overflow-y-auto filter-scroll flex-grow">
        </div>

        <div class="mt-auto pt-6 flex flex-col gap-3">
            <button id="btn-ready" class="btn-deco h-12 w-full">준비하기</button>
            <button id="btn-start" class="btn-deco h-12 w-full" style="display:none; background-color: #D4AF37; color: #0A0A0A; border-color: #D4AF37;">게임 시작</button>
        </div>
    </div>

    <div id="main-game-screen" class="screen">
        
        <div class="h-14 bg-obsidian border-b border-gold/40 flex justify-between items-center px-5 relative z-20 shadow-gold-glow shrink-0">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <span class="diamond-dot" style="width: 4px; height: 4px;"></span>
                    <span id="in-game-clock" class="font-display text-[10px] tracking-[0.2em] text-pewter uppercase">Day Phase · 16:00</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="currency-separator" class="text-gold/50 text-[10px] mt-[1px]">|</span>
                    <span id="in-game-currency" class="font-display text-[10px] tracking-[0.2em] text-pewter uppercase">100 G</span>
                </div>
            </div>
            <div id="in-game-role" class="font-display text-xs tracking-[0.1em] text-gold font-bold"></div>
        </div>
        
        <div class="w-full aspect-square bg-charcoal flex justify-center items-center border-b border-gold/40 double-frame relative overflow-hidden shrink-0">
            <img id="main-image" src="AM_main.jpg" alt="카지노 메인사진" onerror="this.style.display='none'" class="absolute inset-0 w-full h-full object-cover opacity-60 grayscale transition-all duration-700">
            
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-obsidian/80 pointer-events-none z-10"></div>
            
            <div class="text-center relative z-20 pointer-events-none flex flex-col items-center">
                <span class="diamond-dot mb-3 w-3 h-3 animate-pulse"></span>
                <h2 id="main-image-text" class="font-display text-xl text-gold/60 tracking-[0.2em] uppercase drop-shadow-[0_0_10px_rgba(212,175,55,0.4)]">AM_main.jpg</h2>
            </div>
        </div>
        
        <div id="control-panel" class="flex-grow p-5 flex flex-col justify-center items-center w-full overflow-y-auto filter-scroll">
        </div>
        
    </div>

    <div id="alert-modal">
        <div class="alert-box double-frame">
            <span class="deco-bracket deco-bracket--tl" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--tr" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--bl" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--br" style="width:10px; height:10px;"></span>
            
            <div class="mb-6 font-display text-gold tracking-[0.1em] uppercase text-sm" id="alert-title">Notice</div>
            <p id="alert-msg" class="mb-8 font-body text-champagne text-base leading-relaxed tracking-wide"></p>
            <button class="btn-deco h-12 w-full" onclick="closeAlert()">확인 (Acknowledge)</button>
        </div>
    </div>

</div>

<script>
    // Socket.io 연결
    const socket = io();

    // 클라이언트 상태 관리
    let myData = null;
    let currentRoom = null;
    let currentGameData = {}; // 선택된 숫자나 판돈 등 임시 저장소

    // --- 💰 재화 시스템 관리 ---
    window.playerCurrency = 100; // 기본 초기 재화
    
    // 재화 단위 변환 로직 (k, m)
    window.formatCurrency = (amount) => {
        if (amount >= 1000000) {
            // 소수점 2자리 표기 (ex: 1,780,342 -> 1.78m)
            return (Math.floor(amount / 10000) / 100).toFixed(2) + 'm G';
        } else if (amount >= 1000) {
            // 소수점 1자리 표기 (ex: 2,738 -> 2.7k)
            return (Math.floor(amount / 100) / 10).toFixed(1) + 'k G';
        } else {
            // 천 단위 미만 (ex: 999)
            return amount + ' G';
        }
    };

    // UI에 현재 재화 업데이트
    window.updateCurrencyDisplay = () => {
        const currencyEl = document.getElementById('in-game-currency');
        if(currencyEl) {
            currencyEl.innerText = window.formatCurrency(window.playerCurrency);
        }
    };

    // --- 💰 공통 베팅 패널 UI 렌더링 함수 ---
    window.renderBettingPanel = (onConfirm, onCancel) => {
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-2 my-auto">
                <div class="text-center mb-1 flex justify-between items-end border-b border-gold/30 pb-1">
                    <span class="font-display text-gold tracking-widest text-xs uppercase">베팅 금액</span>
                    <span class="font-display text-pewter text-[10px]">보유: ${window.formatCurrency(window.playerCurrency)}</span>
                </div>
                <input type="number" id="bet-input" class="input-deco text-xl font-bold text-gold !py-2 bg-obsidian/50" placeholder="0" value="0">
                <div class="grid grid-cols-4 gap-1 mt-1">
                    <button onclick="addBet(10)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+10</button>
                    <button onclick="addBet(50)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+50</button>
                    <button onclick="addBet(100)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+100</button>
                    <button onclick="addBet(1000)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+1k</button>
                    <button onclick="addBet('HALF')" class="btn-deco min-h-[36px] text-[10px] border-pewter text-pewter hover:bg-white/10">HALF</button>
                    <button onclick="addBet('MAX')" class="btn-deco min-h-[36px] text-[10px] border-red-500 text-red-500 col-span-3 hover:bg-red-900/30">MAX</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button id="btn-cancel-bet" class="btn-deco min-h-[48px] text-xs border-pewter text-pewter">취소 (CANCEL)</button>
                    <button id="btn-confirm-bet" class="btn-deco btn-solid min-h-[48px] text-xs">확인 (CONFIRM)</button>
                </div>
            </div>
        `;
        
        window.addBet = (val) => {
            const input = document.getElementById('bet-input');
            let current = parseInt(input.value) || 0;
            if (val === 'MAX') current = window.playerCurrency;
            else if (val === 'HALF') current = Math.floor(window.playerCurrency / 2);
            else current += val;
            
            if (current > window.playerCurrency) current = window.playerCurrency;
            input.value = current;
        };

        document.getElementById('btn-cancel-bet').onclick = onCancel;
        document.getElementById('btn-confirm-bet').onclick = () => {
            const bet = parseInt(document.getElementById('bet-input').value) || 0;
            if (bet <= 0) return showAlert("베팅 금액을 입력하십시오.");
            if (bet > window.playerCurrency) return showAlert("보유 재화가 부족합니다.");
            onConfirm(bet);
        };
    };

    // --- 💰 룰렛 배당률 계산 로직 (유럽식 싱글 제로 기준) ---
    window.calculateRoulettePayout = (bet, resultNum) => {
        const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        resultNum = parseInt(resultNum);
        
        // 제로(0)가 나오면 직접 건 사람 외엔 모두 꽝
        if (resultNum === 0) return bet === '0' ? 36 : 0;

        if (bet === resultNum.toString()) return 36; // 단일 숫자
        if (bet === '1st 12' && resultNum >= 1 && resultNum <= 12) return 3; // 1~12
        if (bet === '2nd 12' && resultNum >= 13 && resultNum <= 24) return 3; // 13~24
        if (bet === '3rd 12' && resultNum >= 25 && resultNum <= 36) return 3; // 25~36
        if (bet === '1-18' && resultNum >= 1 && resultNum <= 18) return 2; // 1~18
        if (bet === '19-36' && resultNum >= 19 && resultNum <= 36) return 2; // 19~36
        if (bet === 'Even' && resultNum % 2 === 0) return 2; // 짝수
        if (bet === 'Odd' && resultNum % 2 === 1) return 2; // 홀수
        if (bet === 'Red' && reds.includes(resultNum)) return 2; // 빨강
        if (bet === 'Black' && !reds.includes(resultNum)) return 2; // 검정

        return 0; // 해당 없음
    };

    // DOM 요소
    const loginScreen = document.getElementById('login-screen');
    const lobbyScreen = document.getElementById('lobby-screen');
    const mainGameScreen = document.getElementById('main-game-screen');
    const alertModal = document.getElementById('alert-modal');
    
    // 조작화면 DOM
    const mainImage = document.getElementById('main-image');
    const mainImageText = document.getElementById('main-image-text');
    const controlPanel = document.getElementById('control-panel');
    
    // --- 유틸리티 함수 ---
    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        screen.classList.add('active');
    }

    function showAlert(msg) {
        document.getElementById('alert-msg').innerText = msg;
        alertModal.style.display = 'flex';
    }

    function closeAlert() {
        alertModal.style.display = 'none';
    }

    // --- 1. 로그인 로직 ---
    document.getElementById('btn-login').addEventListener('click', () => {
        const name = document.getElementById('player-name').value.trim();
        const roomNum = document.getElementById('room-num').value;

        if (!name) { showAlert('요원 이름을 입력하십시오.'); return; }
        if (!roomNum || roomNum < 1 || roomNum > 9) { showAlert('올바른 방 번호를 입력하십시오. (1~9)'); return; }

        socket.emit('joinRoom', { name, roomNum });
    });

    // --- 소켓 이벤트 리스너 ---
    socket.on('errorMsg', (msg) => { showAlert(msg); });

    socket.on('joinedRoom', (data) => {
        currentRoom = data.roomNum;
        myData = data.me;
        
        const romanNums = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX'];
        document.getElementById('display-room').innerText = romanNums[currentRoom - 1] || currentRoom;
        
        showScreen(lobbyScreen);
    });

    socket.on('updateRoomState', (players) => {
        const container = document.getElementById('players-container');
        container.innerHTML = ''; 

        let allReady = true;

        players.forEach(p => {
            const isMe = p.id === socket.id;
            if (isMe) myData = p; 
            if (!p.isReady) allReady = false;

            const card = document.createElement('div');
            const borderClass = isMe ? 'border-gold shadow-gold-glow' : 'border-gold/30';
            card.className = `w-full bg-charcoal border ${borderClass} p-5 relative double-frame flex justify-between items-center transition-all`;
            
            const statusText = p.isReady ? 'READY' : 'WAITING';
            const statusColor = p.isReady ? 'text-gold drop-shadow-[0_0_5px_rgba(212,175,55,0.8)]' : 'text-pewter';

            card.innerHTML = `
                <div class="absolute top-1 left-1 w-2 h-2 border-t border-l border-gold/50"></div>
                <div class="absolute bottom-1 right-1 w-2 h-2 border-b border-r border-gold/50"></div>
                
                <div class="flex flex-col gap-1 z-10">

    window.playGacha = () => {
        if(!currentGameData.gachaTarget) { showAlert("먼저 우승할 구슬 번호를 선택하십시오."); return; }

        // 베팅 UI 호출
        window.renderBettingPanel((betAmount) => {
            // 베팅 성공 시 재화 차감 및 실행
            window.playerCurrency -= betAmount;
            window.updateCurrencyDisplay();
            currentGameData.betAmount = betAmount;
            window.executeGachaSpin();
        }, () => {

    window.executeGachaSpin = () => {
        document.getElementById('gacha-selection-ui').style.display = 'none';
        const canvas = document.getElementById('gacha-canvas');
        canvas.classList.remove('hidden'); canvas.classList.add('block');

        controlPanel.innerHTML = `
            <div class="w-full flex justify-center items-center h-full">
                <span class="font-display text-gold tracking-[0.3em] text-xs animate-pulse uppercase">Tracking Marbles...</span>
            </div>
        `;

        const ctx = canvas.getContext('2d');
        const viewW = canvas.width; const viewH = canvas.height; const worldH = 1000; 
        const pegs = [];
        for(let row=0; row<20; row++) {
            let cols = row % 2 === 0 ? 7 : 6;
            for(let c=0; c<cols; c++) {
                pegs.push({ x: 20 + c * 45 + (row % 2 === 0 ? 0 : 22), y: 100 + row * 40, r: 3 });
            }
        }
        const funnelLeft = { x1: 0, y1: 850, x2: 130, y2: 980 };
        const funnelRight = { x1: 300, y1: 850, x2: 170, y2: 980 };
        const balls = [];
        const colors = ['#D4AF37', '#E5E7EB', '#60A5FA', '#F87171', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#94A3B8', '#F97316'];
        for(let i=1; i<=10; i++) {
            balls.push({ num: i, x: 30 + i * 22 + (Math.random() * 10), y: 20 + Math.random() * 30, vx: (Math.random() - 0.5) * 1.5, vy: 0, r: 8, color: colors[i-1] });
        }

        let cameraY = 0; let animationId; let finished = false;

        function updatePhysics() {
            if(finished) return;
            ctx.clearRect(0, 0, viewW, viewH);

            let leadingY = 0;
            for(let b of balls) if(b.y > leadingY) leadingY = b.y;
            let targetCameraY = Math.max(0, Math.min(leadingY - viewH/2, worldH - viewH));
            cameraY += (targetCameraY - cameraY) * 0.1;

            ctx.save();
            ctx.translate(0, -cameraY);

            ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(funnelLeft.x1, funnelLeft.y1); ctx.lineTo(funnelLeft.x2, funnelLeft.y2);
            ctx.moveTo(funnelRight.x1, funnelRight.y1); ctx.lineTo(funnelRight.x2, funnelRight.y2);
            ctx.stroke();

            ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
            for(let p of pegs) { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }

            for(let b of balls) {
                b.vy += 0.08; b.x += b.vx; b.y += b.vy;

                if(b.x < b.r) { b.x = b.r; b.vx *= -0.5; }
                if(b.x > viewW - b.r) { b.x = viewW - b.r; b.vx *= -0.5; }

                const checkWall = (w) => {
                    let dx = w.x2 - w.x1; let dy = w.y2 - w.y1; let l2 = dx*dx + dy*dy;
                    let t = Math.max(0, Math.min(1, ((b.x - w.x1) * dx + (b.y - w.y1) * dy) / l2));
                    let px = w.x1 + t * dx; let py = w.y1 + t * dy;
                    let dist = Math.sqrt((b.x - px)**2 + (b.y - py)**2);
                    if(dist < b.r) {
                        let nx = (b.x - px)/dist; let ny = (b.y - py)/dist;
                        let dot = b.vx*nx + b.vy*ny;
                        b.vx -= 1.5*dot*nx; b.vy -= 1.5*dot*ny;
                        b.x = px + nx * b.r; b.y = py + ny * b.r;
                    }
                };
                checkWall(funnelLeft); checkWall(funnelRight);

                for(let p of pegs) {
                    let dx = b.x - p.x; let dy = b.y - p.y; let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < b.r + p.r) {
                        let nx = dx/dist; let ny = dy/dist; let dot = b.vx*nx + b.vy*ny;
                        b.vx -= 1.8*dot*nx; b.vy -= 1.8*dot*ny;
                        b.vx *= 0.6; b.vy *= 0.6; b.vx += (Math.random() - 0.5) * 0.5;
                        let overlap = (b.r + p.r) - dist;
                        b.x += nx * overlap; b.y += ny * overlap;
                    }
                }

                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(b.num, b.x, b.y);

                // 우승 판정
                if(b.y > 990 && !finished) {
                    finished = true; cancelAnimationFrame(animationId);
                    
                    let isWin = (b.num === currentGameData.gachaTarget);
                    if(isWin) {
                        let winnings = currentGameData.betAmount * 10;
                        window.playerCurrency += winnings;
                        window.updateCurrencyDisplay();
                        showAlert(`우승 에이전트: [ ${b.num} ]\n축하합니다! ${winnings} G 획득!`);
                    } else {
                        showAlert(`우승 에이전트: [ ${b.num} ]\n아쉽게도 낙첨되었습니다.`);
                    }

                    socket.emit('playGame', { roomNum: currentRoom, game: 'gacha_result', data: { target: currentGameData.gachaTarget, winner: b.num } });
                    setTimeout(() => { renderGameMenu(); }, 2000);
                }
            }
            ctx.restore();
            if(!finished) animationId = requestAnimationFrame(updatePhysics);
        }
        updatePhysics();
    };

    // 2. 슬롯 머신 (Canvas 물리엔진 적용 + 수동 정지 버튼 + 레버 애니메이션 분리)
    let slotAnimId;
    window.slotState = 'closed'; // 'idle', 'spinning', 'stopping', 'closed'
    
    // 심볼 데이터 세팅
    const SLOT_SYMBOLS = ['1','2','3','4','5','6','7','8','9','♠','♤','♣','♧','♦','♢','♥','♡'];
    const SYMBOL_H = 40; 
    const TOTAL_L = SLOT_SYMBOLS.length * SYMBOL_H;

    let reels = [];

    window.renderSlot = () => {
        updateMainDisplay('SlotMachine.jpg');
        mainImage.style.display = 'none'; 
        mainImageText.parentElement.style.display = 'none';

        window.slotState = 'closed';
        cancelAnimationFrame(slotAnimId);

        // 릴 초기화 (대기 상태의 천천히 도는 연출)
        reels = [
            { y: 0, speed: 0.5, target: null },
            { y: 40, speed: 0.5, target: null },
            { y: 80, speed: 0.5, target: null }
        ];
        window.slotState = 'idle';

        // 캔버스와 우측 레버 나란히 배치
        createGameOverlay(`
            <div class="flex items-end gap-3" style="perspective: 400px;">
                <div class="relative shadow-gold-glow-intense border-2 border-gold rounded overflow-hidden p-4 bg-charcoal">
                    <canvas id="slot-canvas" width="220" height="120" class="bg-obsidian border border-gold/50 shadow-inner"></canvas>
                    <div class="absolute inset-0 pointer-events-none rounded" style="background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.8) 100%);"></div>
                </div>
                
                <div class="relative w-10 h-[140px] flex flex-col items-center justify-end pb-3">
                    <div id="slot-lever-ball" class="absolute z-30 top-[-2px] left-0 w-10 h-10 bg-red-600 rounded-full border border-red-800 shadow-[inset_-3px_-3px_8px_rgba(0,0,0,0.6),_0_5px_15px_rgba(220,38,38,0.4)] flex justify-center items-center transition-transform duration-300 ease-in-out origin-center">
                        <div class="w-3 h-3 bg-white/40 rounded-full absolute top-1.5 left-2 blur-[1px]"></div>
                    </div>
                    <div id="slot-lever-rod" class="w-3 h-[75px] bg-gradient-to-r from-gray-400 via-gray-200 to-gray-500 rounded-t origin-bottom transition-transform duration-300 ease-in-out relative z-20">
                    </div>
                    <div class="w-8 h-12 bg-gradient-to-br from-gray-800 to-obsidian border border-gray-700 rounded-sm mt-[-5px] z-10 shadow-lg relative">
                        <div class="absolute top-2 left-1/2 -translate-x-1/2 w-1.5 h-8 bg-black rounded-full shadow-inner"></div>
                    </div>
                </div>
            </div>
        `, true);

        // 조작화면 초기화 함수
        window.renderSlotControls = () => {
            controlPanel.innerHTML = `
                <div class="w-full flex flex-col gap-3 my-auto">
                    <button id="btn-spin-slot" onclick="playSlot()" class="btn-deco min-h-[56px] text-xs shadow-[0_0_10px_rgba(212,175,55,0.2)]">머신 작동 (SPIN)</button>
                    <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2 text-obsidian">돌아가기 (RETURN)</button>
                </div>
            `;
        };
        renderSlotControls();

        const canvas = document.getElementById('slot-canvas');
        const ctx = canvas.getContext('2d');

        function drawSlot() {
            if (window.slotState === 'closed') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const slotW = 60; const slotH = 120;
            const startX = 0; const gap = 20;

            for(let r=0; r<3; r++) {
                let rx = startX + r*(slotW + gap);

                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(rx, 0, slotW, slotH);

                ctx.save();
                ctx.beginPath();
                ctx.rect(rx, 0, slotW, slotH);
                ctx.clip(); 

                let reel = reels[r];
                reel.y += reel.speed; 
                if(reel.y >= TOTAL_L) reel.y -= TOTAL_L;

                if (reel.speed > 5) ctx.filter = 'blur(1.5px)';
                else ctx.filter = 'none';

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 28px "Marcellus", serif';

                for(let i=0; i<SLOT_SYMBOLS.length; i++) {
                    let symY = (i * SYMBOL_H) + reel.y;
                    let drawY = symY;
                    if(drawY > TOTAL_L - SYMBOL_H) drawY -= TOTAL_L; 

                    if(drawY > -SYMBOL_H && drawY < slotH + SYMBOL_H) {
                        let sym = SLOT_SYMBOLS[i];
                        if(['♥','♡','♦','♢','7'].includes(sym)) ctx.fillStyle = '#ef4444'; 
                        else ctx.fillStyle = '#D4AF37'; 

                        ctx.fillText(sym, rx + slotW/2, drawY + SYMBOL_H/2);
                    }
                }
                ctx.restore();

                ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.lineWidth = 2;
                ctx.strokeRect(rx, 0, slotW, slotH);
            }

            slotAnimId = requestAnimationFrame(drawSlot);
        }
        drawSlot();
    };

    window.playSlot = () => {
        if(window.slotState === 'spinning' || window.slotState === 'stopping') return;
        
        // 10G 차감 로직
        if(window.playerCurrency < 10) return showAlert("재화가 부족합니다. (10G 필요)");
        window.playerCurrency -= 10;
        window.updateCurrencyDisplay();

        window.slotState = 'spinning';
        
        const rod = document.getElementById('slot-lever-rod');
        const ball = document.getElementById('slot-lever-ball');
        if(rod) rod.style.transform = 'rotateX(70deg)';
        if(ball) ball.style.transform = 'translateY(50px)';

        currentGameData.slotTargets = null;
        currentGameData.stoppedCount = 0;
        reels.forEach(r => { r.speed = 30 + Math.random() * 5; }); 
        
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto items-center">
                <p class="font-display text-gold text-[10px] tracking-widest uppercase mb-1 animate-pulse">Press to Stop</p>
                <div class="flex justify-center gap-5 w-full">
                    <button id="btn-stop-0" onclick="stopSlotReel(0)" class="btn-deco w-[60px] h-[60px] bg-charcoal border border-red-900 hover:bg-red-900/50 hover:border-red-500 transition-colors shadow-[0_0_10px_rgba(239,68,68,0.2)] rounded-sm"></button>
                    <button id="btn-stop-1" onclick="stopSlotReel(1)" class="btn-deco w-[60px] h-[60px] bg-charcoal border border-red-900 hover:bg-red-900/50 hover:border-red-500 transition-colors shadow-[0_0_10px_rgba(239,68,68,0.2)] rounded-sm"></button>
                    <button id="btn-stop-2" onclick="stopSlotReel(2)" class="btn-deco w-[60px] h-[60px] bg-charcoal border border-red-900 hover:bg-red-900/50 hover:border-red-500 transition-colors shadow-[0_0_10px_rgba(239,68,68,0.2)] rounded-sm"></button>
                </div>
            </div>
        `;

        socket.emit('playGame', { roomNum: currentRoom, game: 'slot' });
    };

    // 서버로부터 슬롯 결과를 수신하는 리스너 추가 (이 부분이 누락되어 정지 버튼이 안 눌렸습니다)
    socket.off('slotResult').on('slotResult', (data) => {
        if(window.slotState === 'closed') return;
        currentGameData.slotTargets = data.result;
        currentGameData.slotMsg = data.msg;
    });

    // 🛑 수동 정지 및 결과 배당 로직
    window.stopSlotReel = (r) => {
        if(window.slotState !== 'spinning') return;
        if(reels[r].speed === 0) return; 
        if(!currentGameData.slotTargets) return; 

        let targetIdx = SLOT_SYMBOLS.indexOf(currentGameData.slotTargets[r]);
        let targetY = (SYMBOL_H - (targetIdx * SYMBOL_H) % TOTAL_L + TOTAL_L) % TOTAL_L;
        
        reels[r].speed = 0; 
        reels[r].y = targetY; 

        const btn = document.getElementById(`btn-stop-${r}`);
        if(btn) {
            btn.disabled = true;
            btn.style.backgroundColor = 'rgba(212, 175, 55, 0.2)';
            btn.style.borderColor = '#D4AF37';
            btn.style.boxShadow = 'none';
        }

        currentGameData.stoppedCount++;

        // 3개의 슬롯이 모두 멈췄을 때 결과 계산
        if(currentGameData.stoppedCount === 3) {
            window.slotState = 'stopping';
            
            let t = currentGameData.slotTargets;
            let isWin = (t[0] === t[1] && t[1] === t[2]);
            let isJackpot = isWin && t[0] === '7';
            
            if (isJackpot) {
                window.playerCurrency += 1000000;
                currentGameData.slotMsg = "[ JACKPOT! ]\n기적입니다! 1,000,000 G 획득!";
            } else if (isWin) {
                window.playerCurrency += 1000;
                currentGameData.slotMsg = `[ 당첨! ]\n축하합니다. 1,000 G 획득!`;
            } else {
                currentGameData.slotMsg = "[ 꽝 ]\n10 G를 잃었습니다.";
            }
            window.updateCurrencyDisplay();
            
            setTimeout(() => {
                showAlert(currentGameData.slotMsg);
                window.slotState = 'idle';
                reels.forEach(reel => { reel.speed = 0.5; }); 
                
                const rod = document.getElementById('slot-lever-rod');
                const ball = document.getElementById('slot-lever-ball');
                if(rod) rod.style.transform = 'rotateX(0deg)';
                if(ball) ball.style.transform = 'translateY(0px)';

                renderSlotControls();
            }, 500);
        }
    };

    // 3. 룰렛 (Canvas 물리엔진 및 꽉 찬 카지노식 베팅판 UI)
    window.rouletteAnimId = undefined;
    window.rouletteState = 'closed'; 
    window.wheelAngle = 0;
    window.ballAngleOffset = 0;
    window.ballRadius = 155; 
    window.wheelSpeed = 0.01;
    window.ballAngleOffsetSpeed = 0;
    window.isBoardOpen = false; 

    window.renderRoulette = () => {
        updateMainDisplay('Roulette.jpg');
        mainImage.style.display = 'none'; 
        mainImageText.parentElement.style.display = 'none';

        window.rouletteState = 'idle'; 
        window.wheelAngle = 0;
        window.ballAngleOffset = 0;
        window.ballRadius = 155;
        window.wheelSpeed = 0.01;
        window.isBoardOpen = false;

        // 메인 화면에 룰렛 휠 꽉 차게 배치
        createGameOverlay(`
            <div class="relative shadow-gold-glow-intense border-[6px] border-obsidian rounded-full overflow-hidden bg-charcoal w-[96%] aspect-square max-w-[360px]">
                <canvas id="roulette-canvas" width="340" height="340" class="bg-obsidian w-full h-full"></canvas>
                <div class="absolute inset-0 pointer-events-none rounded-full shadow-[inset_0_0_40px_rgba(0,0,0,0.9)]"></div>
            </div>
        `, true);

        // 하단 조작 패널 호출 (새로 분리된 함수 사용)
        window.renderRouletteControls();

        const canvas = document.getElementById('roulette-canvas');
        const ctx = canvas.getContext('2d');
        const cx = 170, cy = 170; 
        const radius = 140; 
        const pocketAngle = (Math.PI * 2) / 37;
        const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        function drawRoulette() {
            if (window.rouletteState === 'closed') return;

            if (window.rouletteState === 'spinning') {
                window.wheelAngle += window.wheelSpeed;
                window.ballAngleOffset += window.ballAngleOffsetSpeed;
            } else if (window.rouletteState === 'stopping') {
                window.stopFrame++;
                let t = window.stopFrame / window.stopDuration;
                if (t > 1) t = 1;
                let easeOut = 1 - Math.pow(1 - t, 3);
                
                window.ballAngleOffset = window.startOffset + window.totalTravel * easeOut;
                window.ballRadius = 155 - 50 * easeOut; 
                window.wheelAngle += window.wheelSpeed * (1 - easeOut); 
                
                // 🛑 정지할 때 배당 연산 수행
                if (t === 1) {
                    window.rouletteState = 'idle';
                    let resultNum = window.rouletteResultNum; // 소켓에서 받아 저장해둔 결과값
                    let payoutMultiplier = window.calculateRoulettePayout(currentGameData.rouletteBet, resultNum);
                    
                    setTimeout(() => {
                        if (payoutMultiplier > 0) {
                            let winnings = currentGameData.betAmount * payoutMultiplier;
                            window.playerCurrency += winnings;
                            window.updateCurrencyDisplay();
                            showAlert(`[ 적중! ]\n결과: ${resultNum}\n${winnings} G 획득! (${payoutMultiplier}배)`);
                        } else {
                            showAlert(`[ 낙첨 ]\n결과: ${resultNum}\n베팅금을 잃었습니다.`);
                        }
                        const spinBtn = document.getElementById('btn-spin-roulette');
                        if(spinBtn) { spinBtn.disabled = false; spinBtn.innerText = '스핀 (SPIN)'; }
                    }, 500);
                }
            } else if (window.rouletteState === 'idle') {
                window.wheelAngle += 0.002; 
            }

            // --- 렌더링 부 ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 20, 0, 2*Math.PI);
            ctx.fillStyle = '#4a2f1d'; 
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#D4AF37'; 
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(window.wheelAngle);

            for (let i = 0; i < 37; i++) {
                let num = wheelNumbers[i];
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * pocketAngle - pocketAngle/2, (i+1) * pocketAngle - pocketAngle/2);
                ctx.lineTo(0, 0);
                
                if (num === 0) ctx.fillStyle = '#166534'; 
                else if (reds.includes(num)) ctx.fillStyle = '#DC2626'; 
                else ctx.fillStyle = '#171717'; 
                
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
                ctx.stroke(); 

                ctx.save();
                ctx.rotate(i * pocketAngle);
                ctx.translate(radius - 18, 0);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 11px "Josefin Sans", sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.rotate(Math.PI / 2); 
                ctx.fillText(num, 0, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(0, 0, radius - 45, 0, 2*Math.PI);
            ctx.fillStyle = '#D4AF37';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, radius - 55, 0, 2*Math.PI);
            ctx.fillStyle = '#141414'; 
            ctx.fill();

            for(let j=0; j<8; j++) {
                ctx.save();
                ctx.rotate((Math.PI * 2 / 8) * j);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(radius - 45, 0);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }
            ctx.restore();

            let absoluteBallAngle = window.wheelAngle + window.ballAngleOffset;
            let bx = cx + Math.cos(absoluteBallAngle) * window.ballRadius;
            let by = cy + Math.sin(absoluteBallAngle) * window.ballRadius;
            
            ctx.beginPath();
            ctx.arc(bx, by, 6, 0, 2*Math.PI); 
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = -2;
            ctx.shadowOffsetY = 2;
            ctx.fill(); 
            ctx.shadowColor = 'transparent'; 
            
            window.rouletteAnimId = requestAnimationFrame(drawRoulette);
        }
        drawRoulette();
    };

    // 📱 룰렛 하단 패널 분리 렌더링
    window.renderRouletteControls = () => {
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-2 my-auto">
                <div class="text-center mb-1">
                    <span class="font-display ${currentGameData.rouletteBet ? 'text-green-400 border-green-400' : 'text-gold border-gold/30'} tracking-widest text-[11px] uppercase bg-black/50 px-3 py-1.5 rounded border transition-colors duration-300" id="roulette-status">
                        ${currentGameData.rouletteBet ? `베팅 완료: [ ${currentGameData.rouletteBet} ]` : `베팅을 선택하십시오`}
                    </span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-toggle-board" onclick="toggleRouletteBoard()" class="btn-deco min-h-[48px] text-xs bg-green-900/40 hover:bg-green-900/80 shadow-[0_0_10px_rgba(20,83,45,0.5)] transition-all">배팅판 열기</button>
                    <button id="btn-spin-roulette" onclick="playRoulette()" class="btn-deco min-h-[48px] text-xs border-red-500 text-red-500 hover:bg-red-900/50 shadow-[0_0_10px_rgba(239,68,68,0.2)]">스핀 (SPIN)</button>
                </div>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[48px] mt-1 text-obsidian">돌아가기 (RETURN)</button>
            </div>
        `;
    };

    window.toggleRouletteBoard = () => {
        if (window.isBoardOpen) closeRouletteBoard();
        else openRouletteBoard();
    };

    window.openRouletteBoard = () => {
        window.isBoardOpen = true;
        const btn = document.getElementById('btn-toggle-board');
        if (btn) {
            btn.innerText = '배팅판 닫기';
            btn.classList.add('bg-green-900/80', 'border-green-400', 'text-green-400');
            btn.classList.remove('bg-green-900/40');
        }

        const displayContainer = document.getElementById('game-item-overlay') || mainImage.parentElement;
        
        let boardHTML = `
            <div id="roulette-board-overlay" class="absolute inset-0 z-40 bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-3 animate-fade-in">
                <div class="w-full h-[95%] max-w-[300px] bg-green-900 p-3 border-2 border-gold rounded shadow-gold-glow-intense flex flex-col">
                    <div class="w-full flex justify-between items-end mb-3 shrink-0">
                        <span class="text-gold font-display text-sm tracking-widest">PLACE YOUR BETS</span>
                        <span class="text-white/50 text-[10px] uppercase">European Roulette</span>
                    </div>
                    
                    <div onclick="selectRouletteBet('0')" class="w-full shrink-0 text-center border border-white text-white py-3 mb-2 cursor-pointer hover:bg-white/20 font-bold text-lg shadow-sm transition-colors">0 (ZERO)</div>
                    
                    <div class="flex gap-2 mb-2 flex-grow min-h-0">
                        <div class="flex flex-col w-10 gap-2 shrink-0">
                            <div onclick="selectRouletteBet('1st 12')" class="flex-1 flex items-center justify-center border border-white text-white text-xs font-bold cursor-pointer hover:bg-white/20 transition-colors" style="writing-mode: vertical-rl; text-orientation: mixed;">1st 12</div>
                            <div onclick="selectRouletteBet('2nd 12')" class="flex-1 flex items-center justify-center border border-white text-white text-xs font-bold cursor-pointer hover:bg-white/20 transition-colors" style="writing-mode: vertical-rl; text-orientation: mixed;">2nd 12</div>
                            <div onclick="selectRouletteBet('3rd 12')" class="flex-1 flex items-center justify-center border border-white text-white text-xs font-bold cursor-pointer hover:bg-white/20 transition-colors" style="writing-mode: vertical-rl; text-orientation: mixed;">3rd 12</div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 flex-grow overflow-y-auto filter-scroll pb-1">
        `;
        
        const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        for(let i=1; i<=36; i++) {
            let color = reds.includes(i) ? 'bg-red-600' : 'bg-black';
            boardHTML += `<div onclick="selectRouletteBet('${i}')" class="${color} text-white font-bold text-base flex justify-center items-center py-2.5 border border-white/50 cursor-pointer hover:opacity-70 transition-opacity">${i}</div>`;
        }
        
        boardHTML += `
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2 shrink-0">
                        <div onclick="selectRouletteBet('1-18')" class="text-white text-center py-2 border border-white cursor-pointer hover:bg-white/20 text-sm font-bold transition-colors">1 to 18</div>
                        <div onclick="selectRouletteBet('19-36')" class="text-white text-center py-2 border border-white cursor-pointer hover:bg-white/20 text-sm font-bold transition-colors">19 to 36</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2 shrink-0">
                        <div onclick="selectRouletteBet('Even')" class="text-white text-center py-2 border border-white cursor-pointer hover:bg-white/20 text-sm font-bold transition-colors">EVEN (짝수)</div>
                        <div onclick="selectRouletteBet('Odd')" class="text-white text-center py-2 border border-white cursor-pointer hover:bg-white/20 text-sm font-bold transition-colors">ODD (홀수)</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 shrink-0">
                        <div onclick="selectRouletteBet('Red')" class="bg-red-600 text-white text-center py-2 border border-white cursor-pointer hover:opacity-80 text-sm font-bold transition-opacity">RED (빨강)</div>
                        <div onclick="selectRouletteBet('Black')" class="bg-black text-white text-center py-2 border border-white cursor-pointer hover:opacity-80 text-sm font-bold transition-opacity">BLACK (검정)</div>
                    </div>
                </div>
            </div>
        `;
        displayContainer.insertAdjacentHTML('beforeend', boardHTML);
    };

    window.closeRouletteBoard = () => {
        window.isBoardOpen = false;
        const btn = document.getElementById('btn-toggle-board');
        if (btn) {
            btn.innerText = '배팅판 열기';
            btn.classList.remove('bg-green-900/80', 'border-green-400', 'text-green-400');
            btn.classList.add('bg-green-900/40');
        }
        const board = document.getElementById('roulette-board-overlay');
        if(board) board.remove();
    };

    window.selectRouletteBet = (bet) => {
        currentGameData.rouletteBet = bet;
        const statusEl = document.getElementById('roulette-status');
        if(statusEl) statusEl.innerText = `베팅 완료: [ ${bet} ]`;
        
        if(statusEl) {
            statusEl.classList.remove('text-gold', 'border-gold/30');
            statusEl.classList.add('text-green-400', 'border-green-400', 'bg-green-900/50');
            setTimeout(() => {
                statusEl.classList.add('text-gold', 'border-gold/30');
                statusEl.classList.remove('text-green-400', 'border-green-400', 'bg-green-900/50');
            }, 600);
        }
        
        closeRouletteBoard();
        window.renderRouletteControls(); // 상태 업데이트 렌더링
    };

    window.playRoulette = () => {
        if(!currentGameData.rouletteBet) {
            showAlert("먼저 배팅판을 열어 베팅 옵션을 선택하십시오.");
            return;
        }
        if(window.rouletteState === 'spinning' || window.rouletteState === 'stopping') return;

        if(window.isBoardOpen) closeRouletteBoard();

        // 베팅 패널 호출
        window.renderBettingPanel((betAmount) => {
            window.playerCurrency -= betAmount;
            window.updateCurrencyDisplay();
            currentGameData.betAmount = betAmount;
            window.executeRouletteSpin();
        }, () => {
            window.renderRouletteControls();
        });
    };

    window.executeRouletteSpin = () => {
        window.rouletteState = 'spinning';
        window.renderRouletteControls(); // 원상복구 후 텍스트 변경
        
        setTimeout(() => {
            const btn = document.getElementById('btn-spin-roulette');
            if(btn) { btn.disabled = true; btn.innerText = '회전 중...'; }
        }, 50);

        window.wheelSpeed = 0.05;
        window.ballAngleOffsetSpeed = 0.3; 
        window.ballRadius = 158; 

        socket.emit('playGame', { roomNum: currentRoom, game: 'roulette', data: currentGameData.rouletteBet });
    };

    socket.off('rouletteResult').on('rouletteResult', (data) => {
        if(window.rouletteState === 'closed') return;
        
        window.rouletteState = 'stopping';
        window.rouletteResultNum = data.resultNum; // 배당 계산을 위해 저장
        
        const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const targetIndex = wheelNumbers.indexOf(data.resultNum);
        const pocketAngle = (Math.PI * 2) / 37;
        
        let currentMod = window.ballAngleOffset % (Math.PI * 2);
        let targetMod = targetIndex * pocketAngle;
        let diff = targetMod - currentMod;
        if (diff < 0) diff += Math.PI * 2;
        
        window.totalTravel = diff + Math.PI * 2 * 4;
        window.startOffset = window.ballAngleOffset;
        window.stopDuration = 220; 
        window.stopFrame = 0;
    });

    // 4. 그래프
    window.graphAnimId = undefined;
    window.graphState = 'closed'; 
    window.graphMultiplier = 1.00;
    window.graphHistory = [];
    window.graphInterval = null;

    window.renderGraph = () => {
        updateMainDisplay('Graph.jpg');
        mainImage.style.display = 'none'; 
        mainImageText.parentElement.style.display = 'none';

        window.graphState = 'idle';
        window.graphMultiplier = 1.00;
        window.graphHistory = [1.00];

        // 캔버스 UI 배치
        createGameOverlay(`
            <div class="relative shadow-gold-glow border-[4px] border-obsidian rounded-md overflow-hidden bg-charcoal w-[96%] aspect-video max-w-[360px] flex flex-col">
                <div class="absolute top-2 left-3 z-40">
                    <span id="graph-multiplier-display" class="font-mono text-2xl font-bold text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]">1.00x</span>
                </div>
                <div class="absolute top-2 right-3 z-40">
                    <span id="graph-crash-chance" class="font-display text-[10px] text-red-500 tracking-widest uppercase bg-black/50 px-2 py-1 rounded">CRASH RISK: 1%</span>
                </div>
                <canvas id="graph-canvas" width="340" height="190" class="bg-obsidian w-full h-full"></canvas>
            </div>
        `, true);

        window.renderGraphBettingControls();
        drawGraph();
    };

    window.renderGraphBettingControls = () => {
        const minBet = Math.floor(window.playerCurrency / 2);
        
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-2 my-auto">
                <div class="text-center mb-1 flex justify-between items-end border-b border-gold/30 pb-1">
                    <span class="font-display text-gold tracking-widest text-xs uppercase">베팅 금액 (최소 50%)</span>
                    <span class="font-display text-pewter text-[10px]">보유: ${window.formatCurrency(window.playerCurrency)}</span>
                </div>
                <input type="number" id="graph-bet-input" class="input-deco text-xl font-bold text-gold !py-2 bg-obsidian/50" value="${minBet}" readonly>
                <div class="grid grid-cols-4 gap-1 mt-1">
                    <button onclick="addGraphBet(10)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+10</button>
                    <button onclick="addGraphBet(50)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+50</button>
                    <button onclick="addGraphBet(100)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+100</button>
                    <button onclick="addGraphBet(1000)" class="btn-deco min-h-[36px] text-[10px] bg-charcoal hover:bg-gold/20">+1k</button>
                    <button onclick="addGraphBet('MIN')" class="btn-deco min-h-[36px] text-[10px] border-pewter text-pewter hover:bg-white/10 col-span-2">초기화 (MIN)</button>
                    <button onclick="addGraphBet('MAX')" class="btn-deco min-h-[36px] text-[10px] border-red-500 text-red-500 col-span-2 hover:bg-red-900/30">최대 (MAX)</button>
                </div>
                <div class="grid grid-cols-1 gap-2 mt-2">
                    <button onclick="startGraphGame()" class="btn-deco btn-solid min-h-[48px] text-xs shadow-[0_0_10px_rgba(212,175,55,0.4)]">시작하기 (START)</button>
                    <button onclick="renderGameMenu()" class="btn-deco min-h-[48px] text-xs text-obsidian border-pewter text-pewter">돌아가기 (RETURN)</button>
                </div>
            </div>
        `;
        
        window.addGraphBet = (val) => {
            const input = document.getElementById('graph-bet-input');
            const minBet = Math.floor(window.playerCurrency / 2);
            let current = parseInt(input.value) || minBet;
            
            if (val === 'MAX') current = window.playerCurrency;
            else if (val === 'MIN') current = minBet;
            else current += val;
            
            // 50% 이하로 내려가지 않도록 강제 방어
            if (current < minBet) current = minBet;
            if (current > window.playerCurrency) current = window.playerCurrency;
            
            input.value = current;
        };
    };

    window.startGraphGame = () => {
        const input = document.getElementById('graph-bet-input');
        const minBet = Math.floor(window.playerCurrency / 2);
        let bet = parseInt(input.value) || 0;

        if (bet < minBet) {
            showAlert(`전재산의 50%(${minBet}G) 이상을 베팅해야 합니다.`);
            window.renderGraphBettingControls();
            return;
        }
        if (bet > window.playerCurrency) {
            showAlert("보유 재화가 부족합니다.");
            return;
        }

        window.playerCurrency -= bet;
        window.updateCurrencyDisplay();
        currentGameData.graphBet = bet;

        window.graphState = 'playing';
        window.graphMultiplier = 1.00;
        window.graphHistory = [1.00];

        // 멈추기 버튼으로 UI 변경
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto items-center">
                <p class="font-display text-gold text-[10px] tracking-widest uppercase mb-1 animate-pulse">Running...</p>
                <button onclick="stopGraphGame()" class="btn-deco w-full min-h-[80px] text-xl border-red-500 text-red-500 hover:bg-red-500 hover:text-white shadow-[0_0_20px_rgba(239,68,68,0.4)] font-bold transition-all">멈추기 (STOP)</button>
            </div>
        `;

        if(window.graphInterval) clearInterval(window.graphInterval);
        
        // 1초마다 주식 차트처럼 오르락 내리락 연산
        window.graphInterval = setInterval(() => {
            if(window.graphState !== 'playing') return;

            // 터질 확률 계산 (1.00기준 1%, 0.1 오를때마다 1% 증가)
            let addedRisk = Math.floor((window.graphMultiplier - 1.00) / 0.1);
            if (addedRisk < 0) addedRisk = 0;
            let crashChance = 0.01 + (addedRisk * 0.01);

            document.getElementById('graph-crash-chance').innerText = `CRASH RISK: ${(crashChance * 100).toFixed(0)}%`;

            // 1. 터짐 판정
            if (Math.random() < crashChance) {
                window.graphState = 'crashed';
                clearInterval(window.graphInterval);
                document.getElementById('graph-multiplier-display').innerText = window.graphMultiplier.toFixed(2) + 'x';
                document.getElementById('graph-multiplier-display').className = "font-mono text-2xl font-bold text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)] blink-effect";
                
                setTimeout(() => {
                    showAlert(`[ CRASHED! ]\n그래프가 붕괴되었습니다!\n베팅금 ${currentGameData.graphBet} G를 잃었습니다.`);
                    window.renderGraphBettingControls();
                }, 1000);
                return;
            }

            // 2. 오르기(60%) / 내리기(40%) 판정
            if (Math.random() < 0.6) {
                window.graphMultiplier += 0.01;
            } else {
                window.graphMultiplier -= 0.01;
                if(window.graphMultiplier < 0.01) window.graphMultiplier = 0.01; // 음수 방지
            }

            window.graphHistory.push(window.graphMultiplier);
            
            // 배당 텍스트 렌더링
            let displayColor = window.graphMultiplier >= 1.00 ? "text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]" : "text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]";
            document.getElementById('graph-multiplier-display').className = `font-mono text-2xl font-bold ${displayColor}`;
            document.getElementById('graph-multiplier-display').innerText = window.graphMultiplier.toFixed(2) + 'x';

        }, 1000); // 1초(1000ms) 간격
    };

    window.stopGraphGame = () => {
        if(window.graphState !== 'playing') return;

        window.graphState = 'stopped';
        clearInterval(window.graphInterval);

        // 정지 시점의 배당금 계산
        let payout = Math.floor(currentGameData.graphBet * window.graphMultiplier);
        let profit = payout - currentGameData.graphBet;
        
        window.playerCurrency += payout;
        window.updateCurrencyDisplay();

        document.getElementById('graph-multiplier-display').className = "font-mono text-2xl font-bold text-gold drop-shadow-[0_0_8px_rgba(212,175,55,0.8)]";

        setTimeout(() => {
            let msg = profit >= 0 
                ? `[ STOPPED! ]\n${window.graphMultiplier.toFixed(2)}x 에서 멈췄습니다.\n${payout} G 환급! (수익: +${profit} G)` 
                : `[ STOPPED! ]\n${window.graphMultiplier.toFixed(2)}x 에서 멈췄습니다.\n손실이 발생했습니다. (손실: ${profit} G)`;
            showAlert(msg);
            window.renderGraphBettingControls();
        }, 500);
    };

    function drawGraph() {
        if (window.graphState === 'closed') return;
        
        const canvas = document.getElementById('graph-canvas');
        if(!canvas) {
            window.graphAnimId = requestAnimationFrame(drawGraph);
            return;
        }
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);

        // 배경 그리드
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.1)';
        ctx.lineWidth = 1;
        for(let i=0; i<w; i+=25) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
        for(let i=0; i<h; i+=25) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }

        if(window.graphHistory && window.graphHistory.length > 0) {
            const hist = window.graphHistory;
            
            // Y축 스케일링 (최소, 최대 배당률 기준)
            let minVal = Math.min(...hist, 0.95);
            let maxVal = Math.max(...hist, 1.05);
            let range = maxVal - minVal;
            if(range === 0) range = 0.1; 
            
            // X축 스케일링 (최대 30초치 표시)
            let maxPoints = 30; 
            let startIdx = Math.max(0, hist.length - maxPoints);
            let displayHist = hist.slice(startIdx);
            
            let dx = w / Math.max(maxPoints - 1, 1);
            
            ctx.beginPath();
            ctx.moveTo(0, h - ((displayHist[0] - minVal) / range) * (h - 20) - 10);
            
            for(let i=1; i<displayHist.length; i++) {
                let px = i * dx;
                let py = h - ((displayHist[i] - minVal) / range) * (h - 20) - 10;
                ctx.lineTo(px, py);
            }
            
            // 꺾은선 색상 (진행중=초록, 터짐=빨강, 정지=골드)
            if (window.graphState === 'crashed') ctx.strokeStyle = '#ef4444';
            else if (window.graphState === 'stopped') ctx.strokeStyle = '#D4AF37';
            else ctx.strokeStyle = '#4ade80';
            
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 라인 아래 영역 색칠 (그라데이션 느낌)
            ctx.lineTo((displayHist.length-1)*dx, h);
            ctx.lineTo(0, h);
            if (window.graphState === 'crashed') ctx.fillStyle = 'rgba(239, 68, 68, 0.1)';
            else if (window.graphState === 'stopped') ctx.fillStyle = 'rgba(212, 175, 55, 0.1)';
            else ctx.fillStyle = 'rgba(74, 222, 128, 0.1)';
            ctx.fill();

            // 끝에 빛나는 점 찍기
            let lastY = h - ((displayHist[displayHist.length-1] - minVal) / range) * (h - 20) - 10;
            ctx.beginPath();
            ctx.arc((displayHist.length-1)*dx, lastY, 4, 0, Math.PI*2);
            
            if (window.graphState === 'crashed') {
                ctx.fillStyle = '#ef4444';
            } else if (window.graphState === 'stopped') {
                ctx.fillStyle = '#D4AF37';
            } else {
                ctx.fillStyle = '#FFF';
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = 10;
            }
            ctx.fill();
            ctx.shadowBlur = 0; // 초기화
        }

        window.graphAnimId = requestAnimationFrame(drawGraph);
    }

    // 5. 블랙잭
    window.renderBlackjack = () => {
        updateMainDisplay('Blackjack.jpg');
        mainImageText.parentElement.style.display = 'none';
        
        // 메인 화면에 덱 렌더링 (디자인)
        createGameOverlay(`
            <div class="flex gap-2">
                <div class="w-12 h-16 border border-gold/50 rounded flex justify-center items-center bg-obsidian/80 cursor-pointer game-item-btn" onclick="socket.emit('playGame', {game:'blackjack_touch'})">
                    <span class="text-gold text-xs">TOUCH</span>
                </div>
                <div class="w-12 h-16 border border-gold/50 rounded bg-gold/10"></div>
            </div>
        `, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="socket.emit('playGame', {roomNum: currentRoom, game:'blackjack_hit'})" class="btn-deco h-12 text-xs">HIT</button>
                    <button onclick="socket.emit('playGame', {roomNum: currentRoom, game:'blackjack_stand'})" class="btn-deco h-12 text-xs">STAND</button>
                </div>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기</button>
            </div>
        `;
    };

    // 6. 5장 홀덤
    window.renderHoldem = () => {
        updateMainDisplay('Holdem.jpg');
        mainImageText.parentElement.style.display = 'none';
        
        createGameOverlay(`
            <div class="flex gap-1 justify-center">
                ${[1,2,3,4,5].map(i => `<div class="w-10 h-14 border border-gold/50 rounded bg-obsidian/80 flex items-center justify-center cursor-pointer game-item-btn" onclick="showAlert('카드 ${i} 터치')"><span class="text-[8px] text-gold">${i}</span></div>`).join('')}
            </div>
        `, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="socket.emit('playGame', {game:'holdem_call'})" class="btn-deco h-12 text-xs">CHECK / CALL</button>
                    <button onclick="socket.emit('playGame', {game:'holdem_raise'})" class="btn-deco h-12 text-xs">BET / RAISE</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button onclick="socket.emit('playGame', {game:'holdem_fold'})" class="btn-deco h-12 text-xs border-gray-500 text-gray-500">FOLD</button>
                    <button onclick="renderGameMenu()" class="btn-deco btn-solid h-12">돌아가기</button>
                </div>
            </div>
        `;
    };

    // ==========================================

    // [상태 3] 조사하기 하위 메뉴 (바텐더 클릭 버튼에 함수 연결)
    window.renderInvestigateMenu = () => {
        updateMainDisplay('Investigate.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <button onclick="talkToBartender()" class="btn-deco min-h-[56px] text-xs px-2 text-center">바텐더와 대화를 나눈다.</button>
                <button class="btn-deco min-h-[56px] text-xs px-2 text-center">지나가는 사람과 대화를 나눈다.</button>
                <button onclick="renderDayDefault()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
            </div>
        `;
    };

    // [상태 3-1] 바텐더와 대화하기 연출
    window.talkToBartender = () => {
        updateMainDisplay('bartender.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex justify-center items-center h-full">
                <span class="font-display text-gold tracking-[0.2em] animate-pulse">접근 중...</span>
            </div>
        `;

        const displayContainer = mainImage.parentElement;
        
        const overlay = document.createElement('div');
        overlay.id = 'black-overlay';
        overlay.className = 'absolute inset-0 bg-black/80 z-30 opacity-0 transition-opacity duration-300';
        displayContainer.appendChild(overlay);

        setTimeout(() => { overlay.style.opacity = '1'; }, 50);

        setTimeout(() => {
            mainImageText.parentElement.style.display = 'none';

            const messenger = document.createElement('div');
            messenger.id = 'messenger-ui';
            messenger.className = 'absolute inset-x-4 bottom-4 z-40 bg-obsidian/95 border border-gold/50 p-4 shadow-gold-glow flex flex-col gap-2 double-frame';
            
            messenger.innerHTML = `
                <span class="font-display text-gold text-[10px] tracking-widest uppercase border-b border-gold/30 pb-1 w-fit">Bartender</span>
                <p class="font-body text-champagne text-sm tracking-wide leading-relaxed">"무슨 일이시죠?"</p>
            `;
            displayContainer.appendChild(messenger);

            controlPanel.innerHTML = `
                <div class="w-full flex flex-col gap-3 my-auto">
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">술 한잔 하고싶어서요</button>
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">당신을 매각하겠습니다</button>
                    <button onclick="renderInvestigateMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
                </div>
            `;
        }, 1000); 
    };

</script>
