            <div class="w-full flex flex-col gap-2 my-auto">
                <button onclick="window.scsStartGame()" class="btn-deco btn-solid min-h-[50px] text-sm shadow-[0_0_10px_rgba(212,175,55,0.4)]">새 게임 시작 (앤티: ${SCS_ANTE} G)</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.togglePokerGuide()" class="btn-deco min-h-[48px] text-xs border-gold/50 text-gold/80 hover:bg-gold/20">포커 족보 보기</button>
                    <button onclick="renderGameMenu()" class="btn-deco min-h-[48px] text-xs border-pewter text-pewter">돌아가기</button>
                </div>
            </div>
        `;
    };

    // 2. (수정) 인게임 액션 컨트롤 (족보 버튼 및 올인 텍스트 동적 반영)
    window.renderScsActionControls = (toCall) => {
        const p = window.scsGame.players[0];
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-2 my-auto">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.scsHumanAction('fold')" class="btn-deco min-h-[48px] text-xs border-red-500 text-red-500 hover:bg-red-500 hover:text-white">폴드 (FOLD)</button>
                    ${toCall <= 0 
                        ? `<button onclick="window.scsHumanAction('check')" class="btn-deco min-h-[48px] text-xs border-green-400 text-green-400 hover:bg-green-400 hover:text-black">체크 (CHECK)</button>`
                        : `<button onclick="window.scsHumanAction('call')" class="btn-deco min-h-[48px] text-xs border-champagne text-champagne hover:bg-champagne hover:text-black">${window.playerCurrency <= toCall ? '올인 (ALL-IN)' : `콜 (CALL ${toCall})`}</button>`
                    }
                </div>
                <div class="flex gap-2">
                    <input type="number" id="scs-raise-val" class="input-deco w-1/3 !py-1 text-center font-bold text-gold bg-obsidian/50" value="${SCS_MIN_RAISE}" min="${SCS_MIN_RAISE}" step="${SCS_MIN_RAISE}">
                    <button onclick="window.scsHumanAction('raise')" class="btn-deco min-h-[40px] w-2/3 text-xs border-gold text-gold hover:bg-gold hover:text-black">레이즈 (RAISE)</button>
                </div>
                <button onclick="window.togglePokerGuide()" class="btn-deco min-h-[36px] text-[10px] border-gold/30 text-gold/70 hover:bg-gold/20 mt-1">포커 족보 확률 확인</button>
            </div>
        `;
    };

    // UI 업데이트 함수들
    window.scsUpdateUI = () => {
        const g = window.scsGame;
        if (!g) return;

        document.getElementById('scs-pot-display').innerText = `${g.pot} G`;
        document.getElementById('scs-round-info').innerText = g.street <= 4 ? SCS_ROUND_NAMES[g.street] : '—';

        for (let p of g.players) {
            const slot = document.getElementById(`scs-slot-${p.id}`);
            const cardsDiv = document.getElementById(`scs-cards-${p.id}`);
            const chipsSpan = document.getElementById(`scs-chips-${p.id}`);
            const statusDiv = document.getElementById(`scs-status-${p.id}`);

            // 클래스 리셋
            slot.classList.remove('border-green-400', 'opacity-40', 'shadow-[0_0_10px_rgba(74,222,128,0.5)]');
            if (p.folded || p.busted) {
                slot.classList.add('opacity-40');
            } else if (p.id === g.actionIdx) {
                slot.classList.add('border-green-400', 'shadow-[0_0_10px_rgba(74,222,128,0.5)]');
            }

            chipsSpan.innerText = p.id === 0 ? window.formatCurrency(window.playerCurrency) : `${p.chips} G`;
            
            // 카드 렌더링
            cardsDiv.innerHTML = '';
            p.cards.forEach((c, idx) => {
                const wrapper = document.createElement('div');
                // 봇은 카드를 겹치게(음수 마진), 플레이어는 그냥 나열
                if (p.id !== 0 && idx > 0) wrapper.style.marginLeft = '-15px'; 
                wrapper.innerHTML = window.createScsCardHTML(c, c.down, p.id === 0);
                cardsDiv.appendChild(wrapper);
            });
        }
    };

    window.scsSetStatus = (pid, text, colorClass = 'text-champagne') => {
        const el = document.getElementById(`scs-status-${pid}`);
        if(el) {
            el.innerText = text;
            el.className = `font-display text-[8px] h-[12px] ${colorClass} blink-effect`;
            setTimeout(() => { el.classList.remove('blink-effect'); }, 1000);
        }
    };

    // [수정] 게임 시작 함수: 최소 입장 소지금 5000G 제한 추가
    window.scsStartGame = () => {
        // FIX: 1% 룰 적용 시 최소 베팅금(50G)을 충족하기 위한 최소 입장 소지금을 5000G로 제한
        if (window.playerCurrency < 5000) {
            showAlert("입장 불가: 최소 5,000 G 이상 보유해야 포커에 참여할 수 있습니다.");
            return;
        }

        const prevChips = window.scsGame ? window.scsGame.players.map(p => p.chips) : [window.playerCurrency, 10000, 10000, 10000];
        
        window.scsGame = {
            deck: window.scsMakeDeck(),
            pot: 0,
            street: 0,
            currentBet: 0,
            players: [
                { id: 0, name: 'You', chips: window.playerCurrency, cards: [], bet: 0, folded: false, busted: false, isBot: false },
                { id: 1, name: 'Bot 1', chips: prevChips[1], cards: [], bet: 0, folded: false, busted: false, isBot: true },
                { id: 2, name: 'Bot 2', chips: prevChips[2], cards: [], bet: 0, folded: false, busted: false, isBot: true },
                { id: 3, name: 'Bot 3', chips: prevChips[3], cards: [], bet: 0, folded: false, busted: false, isBot: true }
            ],
            actionIdx: 0,
            betRoundActions: 0
        };

        const g = window.scsGame;
        
        // 봇들도 최소 5000G 이상은 가지고 시작하도록 파산 방지 보정
        for(let i=1; i<=3; i++) {
            if(g.players[i].chips < 5000) g.players[i].chips = 10000;
        }

        document.getElementById('scs-log').innerHTML = ''; 
        window.scsLog(`— 새 게임 시작 (앤티: ${SCS_ANTE} G) —`, 'important');

        for (let p of g.players) {
            if (p.id === 0) {
                window.playerCurrency -= SCS_ANTE;
                window.updateCurrencyDisplay();
                p.chips = window.playerCurrency;
            } else {
                p.chips -= SCS_ANTE;
            }
            p.bet += SCS_ANTE;
            g.pot += SCS_ANTE;

            let c1 = g.deck.pop(); c1.down = true;
            let c2 = g.deck.pop(); c2.down = true;
            let c3 = g.deck.pop(); c3.down = false;
            p.cards = [c1, c2, c3];
            
            window.scsSetStatus(p.id, '');
        }

        g.currentBet = 0;
        for (let p of g.players) p.bet = 0;

        g.actionIdx = window.scsFindBringIn();
        window.scsUpdateUI();
        window.scsLog(`3rd Street — [${g.players[g.actionIdx].name}] 부터 시작`, 'action');

        if (g.players[g.actionIdx].chips === 0) {
            g.betRoundActions++;
            setTimeout(window.scsNextAction, 50);
        } else if (g.players[g.actionIdx].isBot) {
            controlPanel.innerHTML = `<div class="w-full flex justify-center items-center h-[50px]"><span class="text-gold animate-pulse text-xs">상대방 턴 대기 중...</span></div>`;
            setTimeout(window.scsDoBotTurn, 800);
        } else {
            window.renderScsActionControls(0);
        }
    };

    window.scsFindBringIn = () => {
        const suitOrder = { '♣': 0, '♦': 1, '♥': 2, '♠': 3 };
        let active = window.scsGame.players.filter(p => !p.folded && !p.busted);
        active.sort((a, b) => {
            let av = a.cards.find(c => !c.down);
            let bv = b.cards.find(c => !c.down);
            if (!av || !bv) return 0;
            if (av.val !== bv.val) return av.val - bv.val;
            return suitOrder[av.suit] - suitOrder[bv.suit];
        });
        return active[0].id;
    };

    // [수정 1] 턴 제어 함수: 올인 유저 제외 및 비동기 호출로 무한 루프 원천 차단
    window.scsNextAction = () => {
        const g = window.scsGame;
        const active = g.players.filter(p => !p.folded && !p.busted);
        if (active.length <= 1) { window.scsEndHand(); return; }

        // FIX: 올인(chips === 0) 유저는 추가 콜이 불가능하므로 베팅 대기열(toAct)에서 완전히 제외
        const toAct = active.filter(p => p.bet < g.currentBet && p.chips > 0);
        
        if (g.betRoundActions >= active.length && toAct.length === 0) {
            window.scsEndStreet();
            return;
        }

        let next = (g.actionIdx + 1) % 4;
        let tries = 0;
        while ((g.players[next].folded || g.players[next].busted) && tries < 4) { next = (next + 1) % 4; tries++; }
        g.actionIdx = next;

        window.scsUpdateUI();

        const p = g.players[g.actionIdx];
        if (p.chips === 0) {
            g.betRoundActions++;
            // FIX: 재귀 깊이 초과로 인한 브라우저 프리징을 막기 위해 비동기로 턴 넘김 처리
            setTimeout(window.scsNextAction, 50);
            return;
        }

        if (p.isBot) {
            controlPanel.innerHTML = `<div class="w-full flex justify-center items-center h-[50px]"><span class="text-gold animate-pulse text-xs">상대방 턴 대기 중...</span></div>`;
            setTimeout(window.scsDoBotTurn, 800);
        } else {
            window.renderScsActionControls(g.currentBet - p.bet);
        }
    };

    // [수정 2] 액션 적용 로직: 모든 레이즈 액션에 대해 1% (하한 5000G) 강제 한도 적용
    window.scsApplyAction = (pid, action, amount) => {
        const g = window.scsGame;
        const p = g.players[pid];
        
        switch (action) {
            case 'fold':
                p.folded = true;
                window.scsSetStatus(pid, 'FOLD', 'text-red-500');
                window.scsLog(`[${p.name}] FOLD`);
                break;
            case 'check':
                g.betRoundActions++;
                window.scsSetStatus(pid, 'CHECK', 'text-green-400');
                window.scsLog(`[${p.name}] CHECK`);
                break;
            case 'call': {
                const callAmt = Math.min(g.currentBet - p.bet, p.chips);
                if (pid === 0) {
                    window.playerCurrency -= callAmt;
                    window.updateCurrencyDisplay();
                    p.chips = window.playerCurrency;
                } else {
                    p.chips -= callAmt;
                }
                p.bet += callAmt;
                g.pot += callAmt;
                g.betRoundActions++;

                let isAllIn = (p.chips === 0);
                window.scsSetStatus(pid, isAllIn ? `ALL-IN` : `CALL ${callAmt}`, isAllIn ? 'text-red-500' : 'text-champagne');
                window.scsLog(`[${p.name}] ${isAllIn ? `ALL-IN (${callAmt})` : `CALL ${callAmt}`}`);
                break;
            }
            case 'raise': {
                let desiredExtra = amount - p.bet;
                
                // [신규 규칙] 사용자가 슬라이더로 크게 베팅하더라도 시스템에서 강제 한도 적용
                const maxLimit = Math.max(5000, Math.floor(p.chips * 0.01));
                desiredExtra = Math.min(desiredExtra, maxLimit);
                
                const netAdd = Math.max(0, Math.min(desiredExtra, p.chips));
                
                if (pid === 0) {
                    window.playerCurrency -= netAdd;
                    window.updateCurrencyDisplay();
                    p.chips = window.playerCurrency;
                } else {
                    p.chips -= netAdd;
                }
                
                p.bet += netAdd;
                g.pot += netAdd;
                g.currentBet = p.bet;
                g.betRoundActions = 1;

                let isAllIn = (p.chips === 0);
                window.scsSetStatus(pid, isAllIn ? `ALL-IN RAISE` : `RAISE ${netAdd}`, isAllIn ? 'text-red-500' : 'text-gold');
                window.scsLog(`[${p.name}] ${isAllIn ? 'ALL-IN RAISE' : `RAISE → ${p.bet}`}`, 'action');
                break;
            }
        }
        window.scsUpdateUI();
    };

    window.scsDoBotTurn = () => {
        const g = window.scsGame;
        if (!g) return;
        const p = g.players[g.actionIdx];
        if (!p || p.folded || p.busted) { window.scsNextAction(); return; }
        
        const toCall = g.currentBet - p.bet;
        const dec = window.scsBotDecide(p, toCall, g.pot, g.street);
        window.scsApplyAction(p.id, dec.action, dec.amount);
        window.scsNextAction();
    };

    // 4. (수정) 플레이어 명령 처리 (잔액 부족 에러 대신 전재산 강제 올인 로직 적용)
    window.scsHumanAction = (action) => {
        const g = window.scsGame;
        if (!g) return;
        const p = g.players[0];
        const toCall = g.currentBet - p.bet;

        if (action === 'fold') {
            window.scsApplyAction(0, 'fold');
        } else if (action === 'check') {
            if (toCall > 0) { showAlert('콜 또는 레이즈를 해야 합니다.'); return; }
            window.scsApplyAction(0, 'check');
        } else if (action === 'call') {
            if (toCall <= 0) { window.scsApplyAction(0, 'check'); return; }
            // 잔액이 부족해도 보유한 칩 전부를 걸도록 자동 처리됨 (scsApplyAction 내부 로직)
            window.scsApplyAction(0, 'call', toCall);
        } else if (action === 'raise') {
            const amt = parseInt(document.getElementById('scs-raise-val').value) || SCS_MIN_RAISE;
            
            let totalDesiredBet = g.currentBet + amt;
            let maxPossibleBet = p.bet + p.chips; // 현재 내 베팅금 + 보유 잔액(전재산)

            if (maxPossibleBet <= g.currentBet) {
                // 내 전재산을 합쳐도 현재 판돈(콜 금액) 이하라면 강제 올인 콜
                window.scsApplyAction(0, 'call', toCall);
            } else {
                // 잔액이 부족하면 올인 레이즈, 넉넉하면 입력한 금액만큼 정상 레이즈
                let finalTotalBet = Math.min(totalDesiredBet, maxPossibleBet);
                window.scsApplyAction(0, 'raise', finalTotalBet);
            }
        }
        window.scsNextAction();
    };

    // 5. (수정) 포커 족보 팝업 함수 (괄호 누락 오류 수정완료)
    window.togglePokerGuide = () => {
        const existing = document.getElementById('poker-guide-overlay');
        if (existing) {
            existing.remove();
            return;
        }

        // 콤펙트한 예시 카드 렌더링을 위한 헬퍼 함수
        const s = (suit) => (suit === '♥' || suit === '♦') ? 'text-red-500' : 'text-obsidian';
        const cHTML = (rank, suit) => `
            <div class="w-[24px] h-[36px] bg-white border border-gold/60 rounded flex flex-col justify-between p-[2px] shadow relative shrink-0">
                <span class="text-[8px] font-bold leading-none ${s(suit)}">${rank}</span>
                <span class="text-[12px] absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 ${s(suit)}">${suit}</span>
            </div>
        `;
        const drawH = (cards) => `<div class="flex gap-1 mb-1.5">${cards.map(c => cHTML(c[0], c[1])).join('')}</div>`;

        const guideHTML = `
            <div id="poker-guide-overlay" class="absolute inset-0 z-[100] bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-fade-in font-body">
                <div class="w-full max-w-[360px] max-h-[85vh] bg-charcoal border-2 border-gold rounded-md shadow-gold-glow-intense flex flex-col overflow-hidden">
                    
                    <div class="w-full text-center py-3 border-b border-gold/30 bg-obsidian/80 shrink-0">
                        <span class="font-display text-gold text-lg tracking-widest font-bold">포커 족보 및 확률</span>
                        <div class="text-pewter text-[10px] mt-1">세븐포커 7장 중 최상위 5장 조합 기준</div>
                    </div>

                    <div class="p-4 overflow-y-auto filter-scroll flex-grow font-mono text-[11px] text-white/90 space-y-4 leading-relaxed">
                        
                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-red-400 font-bold text-sm">1. 스트레이트 플러시</span>
                            <span class="text-white/60 text-[10px] ml-1">(로얄 포함)</span><br>
                            ${drawH([['10','♠'],['J','♠'],['Q','♠'],['K','♠'],['A','♠']])}
                            <span class="text-pewter">5장의 무늬가 같고 숫자가 연속된 패. 가장 강력한 조합.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-gold font-bold text-sm">2. 포 오브 어 카인드 (포카드)</span><br>
                            ${drawH([['8','♥'],['8','♦'],['8','♠'],['8','♣'],['K','♠']])}
                            <span class="text-pewter">동일한 숫자 패 4장이 모인 조합.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-champagne font-bold text-sm">3. 풀 하우스</span><br>
                            ${drawH([['J','♣'],['J','♥'],['J','♠'],['5','♦'],['5','♣']])}
                            <span class="text-pewter">트리플(동일 숫자 3장) + 페어(동일 숫자 2장)의 결합.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-blue-400 font-bold text-sm">4. 플러시</span><br>
                            ${drawH([['A','♦'],['J','♦'],['8','♦'],['5','♦'],['2','♦']])}
                            <span class="text-pewter">숫자 순서와 상관없이 5장이 모두 같은 무늬인 패.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-green-400 font-bold text-sm">5. 스트레이트</span><br>
                            ${drawH([['9','♣'],['8','♦'],['7','♠'],['6','♥'],['5','♠']])}
                            <span class="text-pewter">무늬에 상관없이 숫자가 5장 연속으로 이어진 패.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-purple-400 font-bold text-sm">6. 쓰리 오브 어 카인드 (트리플)</span><br>
                            ${drawH([['Q','♠'],['Q','♥'],['Q','♦'],['9','♣'],['2','♥']])}
                            <span class="text-pewter">5장 중 3장이 같은 숫자인 조합.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-orange-400 font-bold text-sm">7. 투 페어</span><br>
                            ${drawH([['10','♦'],['10','♠'],['7','♣'],['7','♥'],['A','♠']])}
                            <span class="text-pewter">동일한 숫자 2장짜리 쌍이 두 세트 있는 형태.</span>
                        </div>

                        <div class="border-b border-gold/10 pb-3">
                            <span class="text-gray-300 font-bold text-sm">8. 원 페어</span><br>
                            ${drawH([['A','♣'],['A','♥'],['J','♦'],['8','♠'],['4','♣']])}
                            <span class="text-pewter">동일한 숫자 2장이 한 쌍 있는 조합.</span>
                        </div>

                        <div>
                            <span class="text-gray-500 font-bold text-sm">9. 하이카드 (노페어)</span><br>
                            ${drawH([['K','♦'],['10','♠'],['7','♣'],['5','♥'],['2','♠']])}
                            <span class="text-pewter">아무 조합도 맞지 않아 가장 높은 숫자를 따지는 패.</span>
                        </div>

                    </div>

                    <div class="p-3 border-t border-gold/30 bg-obsidian/80 shrink-0 mt-auto">
                        <button onclick="window.togglePokerGuide()" class="btn-deco min-h-[44px] text-xs border-gold text-gold hover:bg-gold/20 w-full transition-all font-bold">닫기 (CLOSE)</button>
                    </div>
                </div>
            </div>
        `;
        
        const container = document.getElementById('game-item-overlay') || document.body;
        container.insertAdjacentHTML('beforeend', guideHTML);
    };

    // [수정 2] 스트리트 종료 함수: 카드 분배 후 선 플레이어가 올인 상태일 때의 충돌 방어
    window.scsEndStreet = () => {
        const g = window.scsGame;
        const active = g.players.filter(p => !p.folded && !p.busted);
        if (active.length <= 1) { window.scsEndHand(); return; }

        g.street++;
        g.currentBet = 0;
        g.betRoundActions = 0;
        for (let p of g.players) {
            p.bet = 0;
            window.scsSetStatus(p.id, '');
        }

        if (g.street > 4) { window.scsShowdown(); return; }

        const isDown = g.street === 4; 
        for (let p of g.players) {
            if (p.folded || p.busted) continue;
            const c = g.deck.pop();
            c.down = isDown;
            p.cards.push(c);
        }

        window.scsLog(`— ${SCS_ROUND_NAMES[g.street]} —`, 'important');
        window.scsUpdateUI();

        let best = null, bestId = active[0].id;
        for (let p of active) {
            const vis = p.cards.filter(c => !c.down);
            const e = window.scsBestHand(vis.length >= 2 ? vis : vis.concat(vis));
            if (!best || window.scsCompareEval(e, best) > 0) { best = e; bestId = p.id; }
        }
        g.actionIdx = bestId;
        window.scsLog(`[${g.players[g.actionIdx].name}] 부터 베팅`, 'action');
        window.scsUpdateUI();

        // FIX: 스트리트의 첫 차례인 플레이어가 이미 올인 상태라면 턴 강제 스킵
        if (g.players[g.actionIdx].chips === 0) {
            g.betRoundActions++;
            setTimeout(window.scsNextAction, 50);
        } else if (g.players[g.actionIdx].isBot) {
            controlPanel.innerHTML = `<div class="w-full flex justify-center items-center h-[50px]"><span class="text-gold animate-pulse text-xs">상대방 턴 대기 중...</span></div>`;
            setTimeout(window.scsDoBotTurn, 800);
        } else {
            window.renderScsActionControls(0);
        }
    };

    window.scsShowdown = () => {
        const g = window.scsGame;
        window.scsLog('— SHOWDOWN —', 'important');
        const active = g.players.filter(p => !p.folded && !p.busted);

        // 모든 카드 오픈
        for (let p of active) for (let c of p.cards) c.down = false;
        window.scsUpdateUI();

        let best = null, winner = null;
        for (let p of active) {
            const e = window.scsBestHand(p.cards);
            p.handEval = e;
            if (!best || window.scsCompareEval(e, best) > 0) { best = e; winner = p; }
        }

        window.scsResolveWinner(winner, best, active);
    };

    window.scsEndHand = () => {
        const g = window.scsGame;
        const active = g.players.filter(p => !p.folded && !p.busted);
        if (active.length === 1) {
            window.scsResolveWinner(active[0], null, active, true);
        }
    };

    window.scsResolveWinner = (winner, bestEval, activePlayers, isFoldWin = false) => {
        const g = window.scsGame;
        const potAmt = g.pot;

        if (winner.id === 0) {
            window.playerCurrency += potAmt;
            window.updateCurrencyDisplay();
        } else {
            winner.chips += potAmt;
        }

        let title = winner.id === 0 ? '🏆 YOU WIN!' : `[${winner.name}] 승리`;
        let handName = isFoldWin ? '상대 전원 기권 (Fold)' : SCS_HAND_NAMES[bestEval.rank];
        
        window.scsLog(`🏆 ${winner.name} 승리! +${potAmt} G (${handName})`, 'win');
        
        let othersStr = isFoldWin ? '' : activePlayers.filter(p => p.id !== winner.id).map(p => `${p.name}: ${SCS_HAND_NAMES[p.handEval.rank]}`).join('\n');

        // 결과 모달 표시
        const overlay = document.getElementById('scs-message-overlay');
        document.getElementById('scs-result-title').innerText = title;
        document.getElementById('scs-result-body').innerText = `획득: ${potAmt} G\n${othersStr}`;
        document.getElementById('scs-result-hand').innerText = handName;
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');

        window.scsUpdateUI(); // 승자 칩 업데이트 반영
        window.renderScsBettingControls(); // 재시작 버튼 띄우기

        // 3초 후 오버레이 닫기
        setTimeout(() => {
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
        }, 3500);
    };

    // ==========================================

    // [상태 3] 조사하기 하위 메뉴 (바텐더 클릭 버튼에 함수 연결)
    window.renderInvestigateMenu = () => {
        updateMainDisplay('Investigate.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <button onclick="talkToBartender()" class="btn-deco min-h-[56px] text-xs px-2 text-center">바텐더와 대화를 나눈다.</button>
                <button class="btn-deco min-h-[56px] text-xs px-2 text-center">지나가는 사람과 대화를 나눈다.</button>
                <button onclick="renderDayDefault()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
            </div>
        `;
    };

    // [상태 3-1] 바텐더와 대화하기 연출
    window.talkToBartender = () => {
        updateMainDisplay('bartender.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex justify-center items-center h-full">
                <span class="font-display text-gold tracking-[0.2em] animate-pulse">접근 중...</span>
            </div>
        `;

        const displayContainer = mainImage.parentElement;
        
        const overlay = document.createElement('div');
        overlay.id = 'black-overlay';
        overlay.className = 'absolute inset-0 bg-black/80 z-30 opacity-0 transition-opacity duration-300';
        displayContainer.appendChild(overlay);

        setTimeout(() => { overlay.style.opacity = '1'; }, 50);

        setTimeout(() => {
            mainImageText.parentElement.style.display = 'none';

            const messenger = document.createElement('div');
            messenger.id = 'messenger-ui';
            messenger.className = 'absolute inset-x-4 bottom-4 z-40 bg-obsidian/95 border border-gold/50 p-4 shadow-gold-glow flex flex-col gap-2 double-frame';
            
            messenger.innerHTML = `
                <span class="font-display text-gold text-[10px] tracking-widest uppercase border-b border-gold/30 pb-1 w-fit">Bartender</span>
                <p class="font-body text-champagne text-sm tracking-wide leading-relaxed">"무슨 일이시죠?"</p>
            `;
            displayContainer.appendChild(messenger);

            controlPanel.innerHTML = `
                <div class="w-full flex flex-col gap-3 my-auto">
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">술 한잔 하고싶어서요</button>
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">당신을 매각하겠습니다</button>
                    <button onclick="renderInvestigateMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
                </div>
            `;
        }, 1000); 
    };

</script>
