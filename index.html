<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>위험한 동업자 (스파이 카지노) - Art Deco Edition</title>
    
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Marcellus&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        obsidian: '#0A0A0A', 
                        champagne: '#F2F0E4', 
                        charcoal: '#141414', 
                        gold: '#D4AF37', 
                        midnight: '#1E3D59', 
                        pewter: '#888888'
                    },
                    fontFamily: { 
                        display: ['Marcellus', '"Noto Serif KR"', 'serif'], 
                        body: ['"Josefin Sans"', '"Noto Serif KR"', 'sans-serif'],
                        mono: ['"Josefin Sans"', 'monospace']
                    },
                    boxShadow: {
                        'gold-glow': '0 0 15px rgba(212, 175, 55, 0.2)',
                        'gold-glow-hover': '0 0 20px rgba(212, 175, 55, 0.5)',
                        'gold-glow-intense': '0 0 30px rgba(212, 175, 55, 0.8)'
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: #0A0A0A; 
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden; 
            color: #F2F0E4;
        }

        /* 아르데코 대각선 빗살무늬 배경 */
        .art-deco-bg {
            background-color: #0A0A0A;
            background-image: 
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.03) 0, rgba(212, 175, 55, 0.03) 1px, transparent 0, transparent 20px), 
                repeating-linear-gradient(-45deg, rgba(212, 175, 55, 0.03) 0, rgba(212, 175, 55, 0.03) 1px, transparent 0, transparent 20px);
        }

        /* 메인 컨테이너 */
        #game-container {
            width: 100%; height: 100%; max-width: 56vh; aspect-ratio: 9 / 16;
            position: relative; overflow: hidden;
            border-left: 2px solid rgba(212, 175, 55, 0.2);
            border-right: 2px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
            display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex-direction: column; width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        .screen.active { display: flex; }

        /* 아르데코 모서리 장식 (L-brackets) */
        .deco-bracket { position: absolute; width: 16px; height: 16px; border-color: #D4AF37; border-style: solid; z-index: 40; pointer-events: none; opacity: 0.6; }
        .deco-bracket--tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .deco-bracket--tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
        .deco-bracket--bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
        .deco-bracket--br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* 다이아몬드 장식 */
        .diamond-dot { width: 6px; height: 6px; background-color: #D4AF37; transform: rotate(45deg); display: inline-block; }

        /* 더블 프레임 효과 */
        .double-frame { position: relative; }
        .double-frame::before {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2); pointer-events: none; z-index: 5;
            transition: border-color 0.5s ease;
        }
        .double-frame:hover::before { border-color: rgba(212, 175, 55, 0.8); }

        /* 스크롤바 디자인 */
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-track { background: #141414; }
        .filter-scroll::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); }

        /* 입력 폼 (Underlined Elegance) */
        .input-deco {
            width: 100%; height: 48px; padding: 8px 12px;
            background: transparent; border: none; border-bottom: 2px solid rgba(212, 175, 55, 0.4);
            color: #F2F0E4; font-family: 'Josefin Sans', sans-serif; font-size: 16px;
            transition: all 0.3s ease; text-align: center; letter-spacing: 0.1em;
        }
        .input-deco:focus { border-bottom-color: #D4AF37; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); outline: none; }
        .input-deco::placeholder { color: #888888; letter-spacing: normal; }

        /* 버튼 (Precision Instruments) */
        .btn-deco {
            width: 100%; display: flex; justify-content: center; align-items: center;
            background: transparent; border: 2px solid #D4AF37; color: #D4AF37;
            font-family: 'Marcellus', 'Noto Serif KR', serif; font-size: 14px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0; position: relative;
        }
        .btn-deco:hover { background: #D4AF37; color: #0A0A0A; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .btn-deco:active { transform: scale(0.98); }
        .btn-deco:disabled { border-color: #555; color: #555; cursor: not-allowed; background: transparent; box-shadow: none; }
        .btn-solid { background: #D4AF37; color: #0A0A0A; }
        .btn-solid:hover { background: #F2E8C4; color: #0A0A0A; }

        /* 알림 모달 */
        #alert-modal {
            display: none; position: absolute; inset: 0; background-color: rgba(10,10,10,0.9);
            z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .alert-box { 
            background-color: #141414; border: 1px solid #D4AF37; padding: 30px 20px; 
            text-align: center; width: 100%; max-width: 320px; position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        /* --- 밤(해킹/CCTV 단말기) 테마 전용 CSS --- */
        .scanline-overlay {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
        }
        .vignette-bg {
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.85) 150%);
            pointer-events: none;
        }
        .rec-dot {
            width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; box-shadow: 0 0 8px #ef4444; }
            50% { opacity: 0.3; box-shadow: 0 0 2px #ef4444; }
            100% { opacity: 1; box-shadow: 0 0 8px #ef4444; }
        }
        .btn-hacker {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(239, 68, 68, 0.5); color: #f87171;
            font-family: 'Josefin Sans', monospace; font-size: 13px; font-weight: bold;
            letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; position: relative;
        }
        .btn-hacker:hover {
            border-color: #ef4444; background: rgba(127, 29, 29, 0.3); color: #fca5a5; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
        .cctv-bracket { position: absolute; width: 12px; height: 12px; border-color: rgba(239, 68, 68, 0.6); border-style: solid; z-index: 40; pointer-events: none; }
        .cctv-bracket--tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .cctv-bracket--tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
        .cctv-bracket--bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
        .cctv-bracket--br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* 게임 내부 요소 (, 카드 등) 효과 */
        .blink-effect { animation: blink 0.5s 2; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        
        .game-item-btn { transition: all 0.2s; }
        .game-item-btn:active { transform: scale(0.9); background-color: #D4AF37; color: #000; }
    </style>
</head>
<body>

<div id="game-container" class="art-deco-bg">
    
    <span class="deco-bracket deco-bracket--tl"></span>
    <span class="deco-bracket deco-bracket--tr"></span>
    <span class="deco-bracket deco-bracket--bl"></span>
    <span class="deco-bracket deco-bracket--br"></span>

    <div id="login-screen" class="screen active p-8">
        <div class="flex-grow flex flex-col justify-center items-center w-full">
            <div class="text-center mb-16 relative w-full">
                <div class="flex justify-center items-center gap-3 mb-4">
                    <div class="h-px w-12 bg-gradient-to-l from-gold to-transparent"></div>
                    <span class="diamond-dot"></span>
                    <div class="h-px w-12 bg-gradient-to-r from-gold to-transparent"></div>
                </div>
                <h1 class="font-display text-3xl text-gold tracking-[0.2em] uppercase font-bold drop-shadow-[0_0_10px_rgba(212,175,55,0.4)] leading-tight">위험한<br>동업자</h1>
                <p class="font-display text-[10px] text-champagne/60 tracking-[0.3em] uppercase mt-4">Spy Casino Protocol</p>
            </div>

            <div class="w-full space-y-8 mb-10">
                <div class="relative w-full text-center">
                    <label class="block mb-2 font-display text-xs text-gold tracking-[0.1em] uppercase">Agent Identity</label>
                    <input type="text" id="player-name" class="input-deco" maxlength="7" placeholder="요원 이름 입력">
                </div>
                <div class="relative w-full text-center">
                    <label class="block mb-2 font-display text-xs text-gold tracking-[0.1em] uppercase">Access Code</label>
                    <input type="number" id="room-num" class="input-deco" min="1" max="9" placeholder="방 번호 (1~9)">
                </div>
            </div>

            <button id="btn-login" class="btn-deco btn-solid h-12 w-full mt-4">입장하기</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen p-6 pt-12">
        <div class="text-center mb-8 border-b border-gold/30 pb-4">
            <p class="font-display text-[10px] text-pewter tracking-[0.3em] uppercase mb-1">VIP Lounge</p>
            <h2 class="font-display text-xl text-gold tracking-[0.2em]">ROOM <span id="display-room"></span></h2>
        </div>
        
        <div id="players-container" class="w-full flex flex-col gap-4 overflow-y-auto filter-scroll flex-grow">
        </div>

        <div class="mt-auto pt-6 flex flex-col gap-3">
            <button id="btn-ready" class="btn-deco h-12 w-full">준비하기</button>
            <button id="btn-start" class="btn-deco h-12 w-full" style="display:none; background-color: #D4AF37; color: #0A0A0A; border-color: #D4AF37;">게임 시작</button>
        </div>
    </div>

    <div id="main-game-screen" class="screen">
        
        <div class="h-14 bg-obsidian border-b border-gold/40 flex justify-between items-center px-5 relative z-20 shadow-gold-glow shrink-0">
            <div class="flex items-center gap-2">
                <span class="diamond-dot" style="width: 4px; height: 4px;"></span>
                <span id="in-game-clock" class="font-display text-[10px] tracking-[0.2em] text-pewter uppercase">Day Phase · 16:00</span>
            </div>
            <div id="in-game-role" class="font-display text-xs tracking-[0.1em] text-gold font-bold"></div>
        </div>
        
        <div class="w-full aspect-square bg-charcoal flex justify-center items-center border-b border-gold/40 double-frame relative overflow-hidden shrink-0">
            <img id="main-image" src="AM_main.jpg" alt="카지노 메인사진" onerror="this.style.display='none'" class="absolute inset-0 w-full h-full object-cover opacity-60 grayscale transition-all duration-700">
            
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-obsidian/80 pointer-events-none z-10"></div>
            
            <div class="text-center relative z-20 pointer-events-none flex flex-col items-center">
                <span class="diamond-dot mb-3 w-3 h-3 animate-pulse"></span>
                <h2 id="main-image-text" class="font-display text-xl text-gold/60 tracking-[0.2em] uppercase drop-shadow-[0_0_10px_rgba(212,175,55,0.4)]">AM_main.jpg</h2>
            </div>
        </div>
        
        <div id="control-panel" class="flex-grow p-5 flex flex-col justify-center items-center w-full overflow-y-auto filter-scroll">
        </div>
        
    </div>

    <div id="alert-modal">
        <div class="alert-box double-frame">
            <span class="deco-bracket deco-bracket--tl" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--tr" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--bl" style="width:10px; height:10px;"></span>
            <span class="deco-bracket deco-bracket--br" style="width:10px; height:10px;"></span>
            
            <div class="mb-6 font-display text-gold tracking-[0.1em] uppercase text-sm" id="alert-title">Notice</div>
            <p id="alert-msg" class="mb-8 font-body text-champagne text-base leading-relaxed tracking-wide"></p>
            <button class="btn-deco h-12 w-full" onclick="closeAlert()">확인 (Acknowledge)</button>
        </div>
    </div>

</div>

<script>
    // Socket.io 연결
    const socket = io();

    // 클라이언트 상태 관리
    let myData = null;
    let currentRoom = null;
    let currentGameData = {}; // 선택된 숫자나 판돈 등 임시 저장소

    // DOM 요소
    const loginScreen = document.getElementById('login-screen');
    const lobbyScreen = document.getElementById('lobby-screen');
    const mainGameScreen = document.getElementById('main-game-screen');
    const alertModal = document.getElementById('alert-modal');
    
    // 조작화면 DOM
    const mainImage = document.getElementById('main-image');
    const mainImageText = document.getElementById('main-image-text');
    const controlPanel = document.getElementById('control-panel');
    
    // --- 유틸리티 함수 ---
    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        screen.classList.add('active');
    }

    function showAlert(msg) {
        document.getElementById('alert-msg').innerText = msg;
        alertModal.style.display = 'flex';
    }

    function closeAlert() {
        alertModal.style.display = 'none';
    }

    // --- 1. 로그인 로직 ---
    document.getElementById('btn-login').addEventListener('click', () => {
        const name = document.getElementById('player-name').value.trim();
        const roomNum = document.getElementById('room-num').value;

        if (!name) { showAlert('요원 이름을 입력하십시오.'); return; }
        if (!roomNum || roomNum < 1 || roomNum > 9) { showAlert('올바른 방 번호를 입력하십시오. (1~9)'); return; }

        socket.emit('joinRoom', { name, roomNum });
    });

    // --- 소켓 이벤트 리스너 ---
    socket.on('errorMsg', (msg) => { showAlert(msg); });

    socket.on('joinedRoom', (data) => {
        currentRoom = data.roomNum;
        myData = data.me;
        
        const romanNums = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX'];
        document.getElementById('display-room').innerText = romanNums[currentRoom - 1] || currentRoom;
        
        showScreen(lobbyScreen);
    });

    socket.on('updateRoomState', (players) => {
        const container = document.getElementById('players-container');
        container.innerHTML = ''; 

        let allReady = true;

        players.forEach(p => {
            const isMe = p.id === socket.id;
            if (isMe) myData = p; 
            if (!p.isReady) allReady = false;

            const card = document.createElement('div');
            const borderClass = isMe ? 'border-gold shadow-gold-glow' : 'border-gold/30';
            card.className = `w-full bg-charcoal border ${borderClass} p-5 relative double-frame flex justify-between items-center transition-all`;
            
            const statusText = p.isReady ? 'READY' : 'WAITING';
            const statusColor = p.isReady ? 'text-gold drop-shadow-[0_0_5px_rgba(212,175,55,0.8)]' : 'text-pewter';

            card.innerHTML = `
                <div class="absolute top-1 left-1 w-2 h-2 border-t border-l border-gold/50"></div>
                <div class="absolute bottom-1 right-1 w-2 h-2 border-b border-r border-gold/50"></div>
                
                <div class="flex flex-col gap-1 z-10">
                    <span class="font-display text-lg text-champagne tracking-widest">${p.name} <span class="text-[10px] text-gold/60 ml-1">${isMe ? '(YOU)' : ''}</span></span>
                    <span class="font-display text-[10px] text-pewter tracking-[0.2em] uppercase">${p.role} · SLOT ${p.slot.replace('p', '')}</span>
                </div>
                <div class="font-display text-xs tracking-[0.2em] font-bold z-10 ${statusColor}">
                    ${statusText}
                </div>
            `;
            container.appendChild(card);
        });

        if (players.length === 1) {
            allReady = false;
            const emptyCard = document.createElement('div');
            emptyCard.className = 'w-full bg-transparent border border-pewter/30 p-5 relative flex justify-between items-center opacity-50';
            emptyCard.innerHTML = `
                <div class="flex flex-col gap-1">
                    <span class="font-display text-sm text-pewter tracking-widest">AWAITING PARTNER...</span>
                    <span class="font-display text-[10px] text-pewter/50 tracking-[0.2em] uppercase">Unknown Identity</span>
                </div>
            `;
            container.appendChild(emptyCard);
        }

        const btnReady = document.getElementById('btn-ready');
        const btnStart = document.getElementById('btn-start');

        if (myData && myData.isReady) {
            btnReady.innerText = "준비 취소 (CANCEL)";
            btnReady.style.backgroundColor = "transparent";
            btnReady.style.color = "#888888";
            btnReady.style.borderColor = "#888888";
        } else {
            btnReady.innerText = "준비하기 (READY)";
            btnReady.style.backgroundColor = "transparent";
            btnReady.style.color = "#D4AF37";
            btnReady.style.borderColor = "#D4AF37";
        }

        if (myData && myData.slot === 'p1' && players.length === 2 && allReady) {
            btnStart.style.display = 'flex';
            btnReady.style.display = 'none'; 
        } else {
            btnStart.style.display = 'none';
            btnReady.style.display = 'flex';
        }
    });

    socket.on('playerLeft', (msg) => {
        showAlert(msg);
        showScreen(lobbyScreen); 
    });

    socket.on('gameStarted', () => {
        document.getElementById('in-game-role').innerText = `${myData.name} [ ${myData.role} ]`;
        showScreen(mainGameScreen);
        
        // 게임 시작 시 낮 기본 메뉴 호출 및 시간 타이머 시작
        renderDayDefault();
        startDayPhaseClock();
    });

    // 게임 결과 수신 이벤트
    socket.on('gameResult', (data) => {
        showAlert(data.msg);
    });

    // --- 2. 로비 컨트롤 로직 ---
    document.getElementById('btn-ready').addEventListener('click', () => {
        socket.emit('toggleReady', { roomNum: currentRoom });
    });

    document.getElementById('btn-start').addEventListener('click', () => {
        socket.emit('startGame', { roomNum: currentRoom });
    });

    // --- 3. 게임 시스템 로직 (타이머 및 시간 계산) ---
    
    let gameClockInterval = null;

    // 낮 시간 타이머 시작 (현실 240초 = 게임 16:00 ~ 24:00)
    function startDayPhaseClock() {
        let elapsedSeconds = 0;
        const clockEl = document.getElementById('in-game-clock');
        if(clockEl) clockEl.innerText = "DAY PHASE · 16:00";

        gameClockInterval = setInterval(() => {
            elapsedSeconds++;
            
            // 현실 30초당 게임 시간 1시간씩 증가 (16시부터 시작)
            const currentHour = 16 + Math.floor(elapsedSeconds / 30);
            
            if (clockEl && currentHour <= 24) {
                clockEl.innerText = `DAY PHASE · ${currentHour}:00`;
            }

            // 240초 도달 시 (24:00)
            if (elapsedSeconds >= 240) {
                clearInterval(gameClockInterval);
                transitionToNightPhase(); // 밤으로 전환
            }
        }, 1000); // 1초마다 실행
    }

    // 밤(해킹/CCTV) 화면으로 전환하는 함수
    window.transitionToNightPhase = () => {
        // 1. 헤더 시간 표시 교체 (REC 버튼 및 시스템 폰트 추가)
        const clockEl = document.getElementById('in-game-clock');
        if(clockEl) {
            clockEl.innerText = "CAM-01 · DRONE FEED";
            clockEl.className = "font-mono text-[9px] tracking-[0.2em] text-red-500 uppercase";
            // 기존 다이아몬드 지우고 REC 붉은 점 추가
            clockEl.parentElement.innerHTML = `<span class="rec-dot mr-2"></span>` + clockEl.outerHTML; 
        }
        
        // 2. 전체 테마 교체 (골드 카지노 -> 블랙/레드 해커 테마)
        const container = document.getElementById('game-container');
        container.classList.remove('art-deco-bg');
        container.style.backgroundColor = '#050505';
        container.style.boxShadow = '0 0 30px rgba(220, 38, 38, 0.1)';
        container.style.borderColor = 'rgba(239, 68, 68, 0.3)';

        // 낮 전용 골드 모서리 장식 숨기기
        document.querySelectorAll('.deco-bracket').forEach(el => el.style.display = 'none');

        // 상단 헤더 선 색상 교체
        const header = document.querySelector('.h-14.bg-obsidian');
        if(header) {
            header.classList.remove('border-gold/40', 'shadow-gold-glow');
            header.classList.add('border-red-900/50', 'shadow-[0_4px_12px_rgba(220,38,38,0.15)]');
            
            const roleEl = document.getElementById('in-game-role');
            if (roleEl) {
                roleEl.classList.remove('text-gold');
                roleEl.classList.add('text-red-500', 'font-mono');
            }

    // ==========================================
    // 🎲 6종 카지노 게임 구현부

    // 1. 구슬뽑기 (보강된 물리 엔진: 깔대기, 카메라 무빙, 속도 조절)
    window.renderGacha = () => {
        mainImage.style.display = 'none'; 
        mainImageText.parentElement.style.display = 'none';

        let marblesHTML = `
            <div class="flex flex-col items-center gap-4 w-full" id="gacha-selection-ui">

        for(let i=1; i<=10; i++) {
            marblesHTML += `<button onclick="selectGachaMarble(${i})" class="game-item-btn aspect-square rounded-full border border-gold/50 text-gold font-body text-lg flex justify-center items-center hover:bg-gold/20 shadow-gold-glow">${i}</button>`;
        }
        marblesHTML += `
                </div>
            </div>
            <canvas id="gacha-canvas" width="300" height="300" class="hidden bg-obsidian border border-gold/30 shadow-gold-glow-intense"></canvas>
        `;
        createGameOverlay(marblesHTML, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto text-center">
                <p class="font-display text-gold text-[11px] tracking-widest mb-2 uppercase" id="gacha-status">Select your lucky number</p>
                <button onclick="playGacha()" class="btn-deco min-h-[56px] text-xs">구슬 굴리기 (RELEASE)</button>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2 text-obsidian">돌아가기 (RETURN)</button>
            </div>
        `;
    };

    window.selectGachaMarble = (num) => {
        currentGameData.gachaTarget = num;
        document.getElementById('gacha-status').innerText = `SELECTED AGENT: [ ${num} ]`;
        // 버튼 시각적 강조 피드백
        document.querySelectorAll('#gacha-selection-ui button').forEach((btn, idx) => {
            if(idx + 1 === num) {
                btn.style.borderColor = "#D4AF37";
                btn.style.backgroundColor = "rgba(212, 175, 55, 0.3)";
            } else {
                btn.style.borderColor = "rgba(212, 175, 55, 0.5)";
                btn.style.backgroundColor = "transparent";
            }
        });
    };

    window.playGacha = () => {
        if(!currentGameData.gachaTarget) { showAlert("먼저 우승할 구슬 번호를 선택하십시오."); return; }

        document.getElementById('gacha-selection-ui').style.display = 'none';
        const canvas = document.getElementById('gacha-canvas');
        canvas.classList.remove('hidden');
        canvas.classList.add('block');

        controlPanel.innerHTML = `
            <div class="w-full flex justify-center items-center h-full">
                <span class="font-display text-gold tracking-[0.3em] text-xs animate-pulse uppercase">Tracking Marbles...</span>
            </div>
        `;

        const ctx = canvas.getContext('2d');
        const viewW = canvas.width;
        const viewH = canvas.height;
        const worldH = 1000; // 실제 트랙 길이 (화면의 약 3.3배)

        // 장애물(핀) 생성 (더 긴 트랙에 맞춰 많이 배치)
        const pegs = [];
        for(let row=0; row<20; row++) {
            let cols = row % 2 === 0 ? 7 : 6;
            for(let c=0; c<cols; c++) {
                pegs.push({
                    x: 20 + c * 45 + (row % 2 === 0 ? 0 : 22),
                    y: 100 + row * 40,
                    r: 3
                });
            }
        }

        // 깔대기(Funnel) 벽 데이터
        const funnelLeft = { x1: 0, y1: 850, x2: 130, y2: 980 };
        const funnelRight = { x1: 300, y1: 850, x2: 170, y2: 980 };

        const balls = [];
        const colors = ['#D4AF37', '#E5E7EB', '#60A5FA', '#F87171', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#94A3B8', '#F97316'];
        for(let i=1; i<=10; i++) {
            balls.push({
                num: i,
                x: 30 + i * 22 + (Math.random() * 10),
                y: 20 + Math.random() * 30,
                vx: (Math.random() - 0.5) * 1.5,
                vy: 0,
                r: 8,
                color: colors[i-1]
            });
        }

        let cameraY = 0;
        let animationId;
        let finished = false;

        function updatePhysics() {
            if(finished) return;
            ctx.clearRect(0, 0, viewW, viewH);

            // 카메라 로직: 가장 멀리 내려간 공을 추적
            let leadingY = 0;
            for(let b of balls) if(b.y > leadingY) leadingY = b.y;
            
            // 카메라가 부드럽게 따라가도록 설정 (viewH/2 지점을 기준으로 트래킹)
            let targetCameraY = Math.max(0, Math.min(leadingY - viewH/2, worldH - viewH));
            cameraY += (targetCameraY - cameraY) * 0.1; // 부드러운 보간

            ctx.save();
            ctx.translate(0, -cameraY); // 카메라 좌표계 적용

            // 깔대기 그리기
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(funnelLeft.x1, funnelLeft.y1); ctx.lineTo(funnelLeft.x2, funnelLeft.y2);
            ctx.moveTo(funnelRight.x1, funnelRight.y1); ctx.lineTo(funnelRight.x2, funnelRight.y2);
            ctx.stroke();

            // 핀 그리기
            ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
            for(let p of pegs) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            }

            // 구슬 시뮬레이션
            for(let b of balls) {
                b.vy += 0.08; // 하강 속도 조절 (기존 0.15에서 감소)
                b.x += b.vx;
                b.y += b.vy;

                // 벽 충돌 (옆면)
                if(b.x < b.r) { b.x = b.r; b.vx *= -0.5; }
                if(b.x > viewW - b.r) { b.x = viewW - b.r; b.vx *= -0.5; }

                // 깔대기 벽 충돌 로직 (선분-원 충돌)
                const checkWall = (w) => {
                    let dx = w.x2 - w.x1; let dy = w.y2 - w.y1;
                    let l2 = dx*dx + dy*dy;
                    let t = Math.max(0, Math.min(1, ((b.x - w.x1) * dx + (b.y - w.y1) * dy) / l2));
                    let px = w.x1 + t * dx; let py = w.y1 + t * dy;
                    let dist = Math.sqrt((b.x - px)**2 + (b.y - py)**2);
                    if(dist < b.r) {
                        let nx = (b.x - px)/dist; let ny = (b.y - py)/dist;
                        let dot = b.vx*nx + b.vy*ny;
                        b.vx -= 1.5*dot*nx; b.vy -= 1.5*dot*ny;
                        b.x = px + nx * b.r; b.y = py + ny * b.r;
                    }
                };
                checkWall(funnelLeft); checkWall(funnelRight);

                // 핀 충돌
                for(let p of pegs) {
                    let dx = b.x - p.x; let dy = b.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < b.r + p.r) {
                        let nx = dx/dist; let ny = dy/dist;
                        let dot = b.vx*nx + b.vy*ny;
                        b.vx -= 1.8*dot*nx; b.vy -= 1.8*dot*ny;
                        b.vx *= 0.6; b.vy *= 0.6;
                        b.vx += (Math.random() - 0.5) * 0.5;
                        let overlap = (b.r + p.r) - dist;
                        b.x += nx * overlap; b.y += ny * overlap;
                    }
                }

                // 구슬 렌더링
                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                // 구슬 광택 효과 (Art Deco)
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.2, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 9px sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(b.num, b.x, b.y);

                // 우승 판정: 깔대기 구멍 통과
                if(b.y > 990 && !finished) {
                    finished = true;
                    cancelAnimationFrame(animationId);
                    
                    socket.emit('playGame', { 
                        roomNum: currentRoom, 
                        game: 'gacha_result', 
                        data: { target: currentGameData.gachaTarget, winner: b.num } 
                    });
                    
                    setTimeout(() => { renderGameMenu(); }, 2000);
                }
            }
            ctx.restore();
            if(!finished) animationId = requestAnimationFrame(updatePhysics);
        }
        updatePhysics();
    };

    // 2. 슬롯 머신 (Canvas 물리엔진 적용)
    let slotAnimId;
    window.slotState = 'closed'; // 'idle', 'spinning', 'stopping', 'closed'
    
    // 심볼 데이터 세팅
    const SLOT_SYMBOLS = ['1','2','3','4','5','6','7','8','9','♠','♤','♣','♧','♦','♢','♥','♡'];
    const SYMBOL_H = 40; // 심볼 1개의 높이
    const TOTAL_L = SLOT_SYMBOLS.length * SYMBOL_H; // 드럼 전체 길이

    // 3개의 슬롯 릴 상태 (속도, y좌표 등)
    let reels = [];

    window.renderSlot = () => {
        updateMainDisplay('SlotMachine.jpg');
        mainImage.style.display = 'none'; 
        mainImageText.parentElement.style.display = 'none';

        // 이전 애니메이션 강제 종료
        window.slotState = 'closed';
        cancelAnimationFrame(slotAnimId);

        // 릴 초기화 (speed 0.5로 대기 상태의 천천히 도는 연출)
        reels = [
            { y: 0, speed: 0.5, target: null },
            { y: 40, speed: 0.5, target: null },
            { y: 80, speed: 0.5, target: null }
        ];
        window.slotState = 'idle';

        // 1:2 비율의 슬롯을 3개 담을 캔버스 생성 (총 크기: 가로 240, 세로 160)
        // 슬롯 각각의 크기는 가로 60, 세로 120 (정확히 1:2 비율)
        createGameOverlay(`
            <div class="relative shadow-gold-glow-intense border-2 border-gold rounded overflow-hidden p-4 bg-charcoal">
                <canvas id="slot-canvas" width="220" height="120" class="bg-obsidian border border-gold/50 shadow-inner"></canvas>
                <div class="absolute inset-0 pointer-events-none rounded" style="background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.8) 100%);"></div>
            </div>
        `, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <button id="btn-spin-slot" onclick="playSlot()" class="btn-deco min-h-[56px] text-xs">머신 작동 (SPIN)</button>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2 text-obsidian">돌아가기</button>
            </div>
        `;

        const canvas = document.getElementById('slot-canvas');
        const ctx = canvas.getContext('2d');

        // 슬롯머신 그리기 루프
        function drawSlot() {
            if (window.slotState === 'closed') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const slotW = 60; const slotH = 120;
            const startX = 0; const gap = 20;

            for(let r=0; r<3; r++) {
                let rx = startX + r*(slotW + gap);

                // 릴 뒷배경
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(rx, 0, slotW, slotH);

                ctx.save();
                ctx.beginPath();
                ctx.rect(rx, 0, slotW, slotH);
                ctx.clip(); // 슬롯 칸 밖으로 심볼이 삐져나가지 않게 마스킹

                let reel = reels[r];
                reel.y += reel.speed; // 위에서 아래로 떨어지는 로직
                if(reel.y >= TOTAL_L) reel.y -= TOTAL_L;

                // 속도가 빠를 때 모션 블러(잔상) 효과
                if (reel.speed > 5) ctx.filter = 'blur(1.5px)';
                else ctx.filter = 'none';

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 28px "Marcellus", serif';

                // 심볼 나열
                for(let i=0; i<SLOT_SYMBOLS.length; i++) {
                    let symY = (i * SYMBOL_H) + reel.y;
                    let drawY = symY;
                    if(drawY > TOTAL_L - SYMBOL_H) drawY -= TOTAL_L; // 끝에 도달하면 위로 순간이동 (무한 반복)

                    // 화면에 보이는 영역만 그리기
                    if(drawY > -SYMBOL_H && drawY < slotH + SYMBOL_H) {
                        let sym = SLOT_SYMBOLS[i];
                        if(['♥','♡','♦','♢','7'].includes(sym)) ctx.fillStyle = '#ef4444'; // 레드는 붉은색
                        else ctx.fillStyle = '#D4AF37'; // 나머지는 골드

                        ctx.fillText(sym, rx + slotW/2, drawY + SYMBOL_H/2);
                    }
                }
                ctx.restore();

                // 슬롯 개별 테두리
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.lineWidth = 2;
                ctx.strokeRect(rx, 0, slotW, slotH);
            }

            slotAnimId = requestAnimationFrame(drawSlot);
        }
        drawSlot();
    };

    window.playSlot = () => {
        if(window.slotState === 'spinning' || window.slotState === 'stopping') return;
        window.slotState = 'spinning';
        
        // 작동 시 버튼 비활성화
        document.getElementById('btn-spin-slot').disabled = true;
        document.getElementById('btn-spin-slot').innerText = '회전 중...';

        // 3개의 릴 속도를 엄청나게 올림
        reels.forEach(r => { r.speed = 25 + Math.random() * 5; }); 
        
        socket.emit('playGame', { roomNum: currentRoom, game: 'slot' });
    };

    // 서버에서 슬롯머신 결과를 받았을 때의 정지 로직
    socket.on('slotResult', (data) => {
        if(window.slotState === 'closed') return;
        window.slotState = 'stopping';
        const targets = data.result; // 예: ['7', '♠', '♡']

        for(let r=0; r<3; r++) {
            // 1번째 릴: 1초 뒤 / 2번째 릴: 2초 뒤 / 3번째 릴: 3초 뒤 정지
            setTimeout(() => {
                let targetIdx = SLOT_SYMBOLS.indexOf(targets[r]);
                
                // 타겟 심볼이 슬롯(높이 120)의 정중앙(y=40)에 오도록 좌표 계산
                let targetY = (SYMBOL_H - (targetIdx * SYMBOL_H) % TOTAL_L + TOTAL_L) % TOTAL_L;
                
                reels[r].speed = 0; // 정지
                reels[r].y = targetY; // 좌표 강제 스냅

                // 마지막 릴 정지 시 결과 출력 및 초기화
                if(r === 2) { 
                    setTimeout(() => {
                        showAlert(data.msg);
                        window.slotState = 'idle';
                        // 다시 천천히 돌기 시작 (선택사항, 원치 않으시면 속도를 0으로 유지)
                        reels.forEach(r => { r.speed = 0.5; });
                        document.getElementById('btn-spin-slot').disabled = false;
                        document.getElementById('btn-spin-slot').innerText = '머신 작동 (SPIN)';
                    }, 800);
                }
            }, (r+1) * 1000); 
        }
    });

    // 메인 화면을 다른 화면으로 덮을 때 캔버스 애니메이션 끄기
    const originalUpdateMainDisplay = updateMainDisplay;
    updateMainDisplay = function(filename) {
        window.slotState = 'closed';
        cancelAnimationFrame(slotAnimId);
        originalUpdateMainDisplay(filename);
    };

    // 3. 룰렛
    window.renderRoulette = () => {
        updateMainDisplay('Roulette.jpg');
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setRouletteBet('red')" class="btn-deco h-12 text-xs border-red-500 text-red-500 hover:bg-red-900/50 hover:text-white">Red</button>
                    <button onclick="setRouletteBet('black')" class="btn-deco h-12 text-xs border-gray-500 text-gray-400 hover:bg-gray-800 hover:text-white">Black</button>
                    <button onclick="showRouletteNumbers()" class="btn-deco h-12 text-xs">숫자 선택</button>
                </div>
                <button onclick="playRoulette()" class="btn-deco min-h-[56px] text-xs">시작하기</button>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기</button>
            </div>
        `;
    };
    window.setRouletteBet = (type) => {
        currentGameData.rouletteBet = type;
        showAlert(`${type.toUpperCase()} 에 베팅을 예약했습니다.`);
    };
    window.showRouletteNumbers = () => {
        mainImageText.parentElement.style.display = 'none';
        
        let gridHTML = `<div class="grid grid-cols-6 gap-1 w-full max-w-[280px] p-2 bg-obsidian/80 border border-gold blink-effect">`;
        for(let i=0; i<=36; i++) {
            gridHTML += `<button onclick="setRouletteBet(${i})" class="game-item-btn p-1 border border-gold/40 text-gold text-[10px] font-mono hover:bg-gold hover:text-black">${i}</button>`;
        }
        gridHTML += `</div>`;
        createGameOverlay(gridHTML, false);
    };
    window.playRoulette = () => {
        if(currentGameData.rouletteBet === undefined) { showAlert("베팅할 색상이나 숫자를 선택하세요."); return; }
        socket.emit('playGame', { roomNum: currentRoom, game: 'roulette', data: currentGameData.rouletteBet });
    };

    // 4. 그래프
    window.renderGraph = () => {
        updateMainDisplay('Graph.jpg');
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto" id="graph-controls">
                <button onclick="startGraph()" class="btn-deco min-h-[56px] text-xs">시작하기</button>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기</button>
            </div>
        `;
    };
    window.startGraph = () => {
        document.getElementById('graph-controls').innerHTML = `
            <button onclick="stopGraph()" class="btn-deco min-h-[64px] text-sm border-red-500 text-red-500 hover:bg-red-500 hover:text-white shadow-[0_0_15px_rgba(239,68,68,0.4)]">멈추기 (STOP)</button>
        `;
        socket.emit('playGame', { roomNum: currentRoom, game: 'graph_start' });
    };
    window.stopGraph = () => {
        socket.emit('playGame', { roomNum: currentRoom, game: 'graph_stop' });
        renderGraph(); // UI 리셋
    };

    // 5. 블랙잭
    window.renderBlackjack = () => {
        updateMainDisplay('Blackjack.jpg');
        mainImageText.parentElement.style.display = 'none';
        
        // 메인 화면에 덱 렌더링 (디자인)
        createGameOverlay(`
            <div class="flex gap-2">
                <div class="w-12 h-16 border border-gold/50 rounded flex justify-center items-center bg-obsidian/80 cursor-pointer game-item-btn" onclick="socket.emit('playGame', {game:'blackjack_touch'})">
                    <span class="text-gold text-xs">TOUCH</span>
                </div>
                <div class="w-12 h-16 border border-gold/50 rounded bg-gold/10"></div>
            </div>
        `, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="socket.emit('playGame', {roomNum: currentRoom, game:'blackjack_hit'})" class="btn-deco h-12 text-xs">HIT</button>
                    <button onclick="socket.emit('playGame', {roomNum: currentRoom, game:'blackjack_stand'})" class="btn-deco h-12 text-xs">STAND</button>
                </div>
                <button onclick="renderGameMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기</button>
            </div>
        `;
    };

    // 6. 5장 홀덤
    window.renderHoldem = () => {
        updateMainDisplay('Holdem.jpg');
        mainImageText.parentElement.style.display = 'none';
        
        createGameOverlay(`
            <div class="flex gap-1 justify-center">
                ${[1,2,3,4,5].map(i => `<div class="w-10 h-14 border border-gold/50 rounded bg-obsidian/80 flex items-center justify-center cursor-pointer game-item-btn" onclick="showAlert('카드 ${i} 터치')"><span class="text-[8px] text-gold">${i}</span></div>`).join('')}
            </div>
        `, true);

        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="socket.emit('playGame', {game:'holdem_call'})" class="btn-deco h-12 text-xs">CHECK / CALL</button>
                    <button onclick="socket.emit('playGame', {game:'holdem_raise'})" class="btn-deco h-12 text-xs">BET / RAISE</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button onclick="socket.emit('playGame', {game:'holdem_fold'})" class="btn-deco h-12 text-xs border-gray-500 text-gray-500">FOLD</button>
                    <button onclick="renderGameMenu()" class="btn-deco btn-solid h-12">돌아가기</button>
                </div>
            </div>
        `;
    };

    // ==========================================

    // [상태 3] 조사하기 하위 메뉴 (바텐더 클릭 버튼에 함수 연결)
    window.renderInvestigateMenu = () => {
        updateMainDisplay('Investigate.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex flex-col gap-3 my-auto">
                <button onclick="talkToBartender()" class="btn-deco min-h-[56px] text-xs px-2 text-center">바텐더와 대화를 나눈다.</button>
                <button class="btn-deco min-h-[56px] text-xs px-2 text-center">지나가는 사람과 대화를 나눈다.</button>
                <button onclick="renderDayDefault()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
            </div>
        `;
    };

    // [상태 3-1] 바텐더와 대화하기 연출
    window.talkToBartender = () => {
        updateMainDisplay('bartender.jpg');
        
        controlPanel.innerHTML = `
            <div class="w-full flex justify-center items-center h-full">
                <span class="font-display text-gold tracking-[0.2em] animate-pulse">접근 중...</span>
            </div>
        `;

        const displayContainer = mainImage.parentElement;
        
        const overlay = document.createElement('div');
        overlay.id = 'black-overlay';
        overlay.className = 'absolute inset-0 bg-black/80 z-30 opacity-0 transition-opacity duration-300';
        displayContainer.appendChild(overlay);

        setTimeout(() => { overlay.style.opacity = '1'; }, 50);

        setTimeout(() => {
            mainImageText.parentElement.style.display = 'none';

            const messenger = document.createElement('div');
            messenger.id = 'messenger-ui';
            messenger.className = 'absolute inset-x-4 bottom-4 z-40 bg-obsidian/95 border border-gold/50 p-4 shadow-gold-glow flex flex-col gap-2 double-frame';
            
            messenger.innerHTML = `
                <span class="font-display text-gold text-[10px] tracking-widest uppercase border-b border-gold/30 pb-1 w-fit">Bartender</span>
                <p class="font-body text-champagne text-sm tracking-wide leading-relaxed">"무슨 일이시죠?"</p>
            `;
            displayContainer.appendChild(messenger);

            controlPanel.innerHTML = `
                <div class="w-full flex flex-col gap-3 my-auto">
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">술 한잔 하고싶어서요</button>
                    <button class="btn-deco min-h-[56px] text-xs px-2 text-center">당신을 매각하겠습니다</button>
                    <button onclick="renderInvestigateMenu()" class="btn-deco btn-solid min-h-[56px] mt-2">돌아가기 (RETURN)</button>
                </div>
            `;
        }, 1000); 
    };

</script>

</body>
</html>
